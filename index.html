<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Upgrade Poker Coach</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#000;color:#fff;min-height:100vh}
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
#app{display:none;min-height:100vh;flex-direction:column}
.card{background:#0a0a0a;border:1px solid #1a9a9a;border-radius:16px;padding:28px;width:100%;max-width:420px}
.btn{width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,#0d7a7a,#1a9a9a);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-sm{background:transparent;border:1px solid #1a9a9a;color:#1a9a9a;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.inp{width:100%;padding:10px 12px;border-radius:8px;background:#111;border:1px solid #333;color:#fff;font-size:13px;outline:none;font-family:inherit}
.inp:focus{border-color:#1a9a9a}
.seg{display:inline-flex;border-radius:8px;overflow:hidden;border:1px solid #333}
.seg button{padding:8px 16px;border:none;background:transparent;color:#555;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap;font-family:inherit;transition:all 0.15s}
.seg button.active{background:#1a9a9a;color:#fff;font-weight:700}
.cp-row{padding:14px 18px;border-bottom:1px solid #111}
.cp-label{font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.opt-btn{text-align:left;padding:11px 13px;border-radius:10px;background:#111;border:1px solid #1e1e1e;color:#aaa;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;line-height:1.4;width:100%;transition:all 0.15s}
.opt-btn:hover{border-color:#333}
.opt-btn.correct{background:rgba(74,222,128,0.1);border-color:#4ade80;color:#4ade80}
.opt-btn.wrong{background:rgba(248,113,113,0.1);border-color:#f87171;color:#f87171}
.opt-btn.dimmed{color:#333;border-color:#111}
select{padding:8px 10px;border-radius:8px;background:#111;border:1px solid #333;color:#aaa;font-size:12px;cursor:pointer;outline:none;font-family:inherit}
</style>
</head>
<body>

<div id="gate">
  <div class="card">
    <div style="text-align:center;margin-bottom:20px">
      <svg viewBox="0 0 100 110" width="60" height="66" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d6e6e"/><stop offset="100%" stop-color="#1a9a9a"/></linearGradient></defs>
        <path d="M50 5C50 5 5 40 5 62c0 16 13 26 27 22-4 6-10 14-14 21h64c-4-7-10-15-14-21 14 4 27-6 27-22C95 40 50 5 50 5z" fill="url(#g1)"/>
        <path d="M50 48l-6 10h3v12h6V58h3z" fill="#1a9a9a" opacity="0.9"/>
      </svg>
      <div style="font-size:20px;font-weight:700;color:#1a9a9a;margin-top:8px">Upgrade Poker Coach</div>
      <div style="font-size:12px;color:#444;margin-top:4px">by <a href="https://upgradepoker.com" style="color:#1a9a9a;text-decoration:none">upgradepoker.com</a></div>
    </div>
    <label style="font-size:11px;color:#555;display:block;margin-bottom:6px">Anthropic API Key</label>
    <input class="inp" type="password" id="api-key" placeholder="sk-ant-api03-..." autocomplete="off" style="margin-bottom:8px"/>
    <p style="font-size:11px;color:#333;margin-bottom:14px;line-height:1.5">Stored only in your browser. <a href="https://console.anthropic.com" target="_blank" style="color:#1a9a9a">Get a free key</a></p>
    <div id="gate-err" style="font-size:12px;color:#f87171;margin-bottom:10px;display:none"></div>
    <button class="btn" onclick="startApp()">Start Training</button>
  </div>
</div>

<div id="app">
  <div style="background:#0a0a0a;border-bottom:1px solid #111;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:10px">
      <div id="avatar" style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#0d7a7a,#1a9a9a);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff"></div>
      <div><div id="uname" style="font-size:13px;font-weight:700"></div><div style="font-size:10px;color:#444">Upgrade Poker Coach</div></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <div id="score-badge" style="background:rgba(26,154,154,0.1);border:1px solid #1a9a9a33;border-radius:14px;padding:3px 10px;font-size:11px;color:#1a9a9a;font-weight:600"></div>
      <button class="btn-sm" onclick="showAnalytics()">Stats</button>
      <button class="btn-sm" onclick="showHandAnalyzer()">Analyze Hand</button>
      <button onclick="switchUser()" style="background:transparent;border:1px solid #222;border-radius:14px;padding:3px 10px;font-size:11px;color:#444;cursor:pointer;font-family:inherit">Switch</button>
    </div>
  </div>
  <div style="display:flex;background:#0a0a0a;border-bottom:1px solid #111">
    <button id="tab-train" onclick="setTab('train')" style="flex:1;padding:11px;border:none;background:transparent;color:#1a9a9a;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid #1a9a9a;font-family:inherit">Training</button>
    <button id="tab-tools" onclick="setTab('tools')" style="flex:1;padding:11px;border:none;background:transparent;color:#444;font-size:13px;font-weight:400;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit">Tools</button>
  </div>
  <div id="panel-train">
    <div style="background:#0a0a0a;border-bottom:2px solid #111">
      <div class="cp-row">
        <div class="cp-label">Game</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div class="seg">
            <button id="seg-holdem" class="active" onclick="setVariant('holdem')">Hold'em</button>
            <button id="seg-plo" onclick="setVariant('plo')">PLO</button>
            <button id="seg-mixed" onclick="setVariant('mixed')">Mixed</button>
          </div>
          <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
            <span id="po-label" style="font-size:12px;color:#444">Pot Odds</span>
            <div onclick="togglePotOdds()" id="po-toggle" style="width:40px;height:22px;border-radius:11px;background:#222;border:1px solid #333;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0">
              <div id="po-thumb" style="position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="cp-row">
        <div class="cp-label">Format</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div class="seg">
            <button id="seg-cash" class="active" onclick="setFormat('cash')">Cash</button>
            <button id="seg-tourney" onclick="setFormat('tournament')">Tournament</button>
          </div>
          <span id="tourney-note" style="font-size:11px;color:#1a9a9a;display:none">ICM · Bubble</span>
          <div style="margin-left:auto"><button class="btn-sm" id="session-btn" onclick="startSession()">Session (10)</button></div>
        </div>
      </div>
      <div class="cp-row">
        <div class="cp-label">Focus</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button id="cat-preflop" onclick="setCat('preflop')" style="padding:8px 18px;border-radius:9px;border:1px solid #1a9a9a;background:#1a9a9a;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Preflop</button>
          <button id="cat-postflop" onclick="setCat('postflop')" style="padding:8px 18px;border-radius:9px;border:1px solid #333;background:transparent;color:#555;font-size:12px;cursor:pointer;font-family:inherit">Postflop</button>
          <button id="cat-bluffing" onclick="setCat('bluffing')" style="padding:8px 18px;border-radius:9px;border:1px solid #333;background:transparent;color:#555;font-size:12px;cursor:pointer;font-family:inherit">Bluffing</button>
        </div>
      </div>
      <div class="cp-row" style="border-bottom:none">
        <div class="cp-label">Settings</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px">
            <span style="font-size:10px;color:#444">Difficulty</span>
            <select id="sel-diff" onchange="state.difficulty=this.value"><option>Beginner</option><option selected>Intermediate</option><option>Advanced</option></select>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px">
            <span style="font-size:10px;color:#444">Villain Type</span>
            <select id="sel-villain" onchange="state.villain=this.value"><option>Nit</option><option selected>TAG</option><option>LAG</option><option>Fish</option><option>Calling Station</option><option>Maniac</option><option>GTO Reg</option></select>
          </div>
        </div>
      </div>
    </div>
    <div id="quiz-area" style="padding:16px;max-width:700px;margin:0 auto;width:100%"></div>
  </div>
  <div id="panel-tools" style="display:none;flex:1;flex-direction:column">
    <div style="display:flex;gap:4px;padding:10px 14px;background:#0a0a0a;border-bottom:1px solid #111;overflow-x:auto">
      <button onclick="setTool('equity')" id="tool-equity" style="padding:6px 12px;border-radius:8px;border:none;background:#1a9a9a;color:#fff;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit">Equity Calc</button>
      <button onclick="setTool('bankroll')" id="tool-bankroll" style="padding:6px 12px;border-radius:8px;border:none;background:rgba(255,255,255,0.05);color:#555;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit">Bankroll</button>
      <button onclick="setTool('handlog')" id="tool-handlog" style="padding:6px 12px;border-radius:8px;border:none;background:rgba(255,255,255,0.05);color:#555;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit">Hand Log</button>
    </div>
    <div id="tool-area" style="padding:18px 16px;max-width:680px;margin:0 auto;width:100%"></div>
  </div>
</div>

<div id="overlay" onclick="closeOverlay()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;padding:16px;overflow-y:auto">
  <div id="overlay-content" onclick="event.stopPropagation()" style="background:#0a0a0a;border:1px solid #1a9a9a33;border-radius:16px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;padding:22px"></div>
</div>

// ── Helpers ────────────────────────────────────────────
function mkDeck(){const d=RANKS.flatMap(r=>SUITS.map(s=>({rank:r,suit:s})));for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}return d;}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function sfl(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function hkey(c1,c2){const r1=RI[c1.rank],r2=RI[c2.rank];const hi=r1>=r2?c1:c2,lo=r1>=r2?c2:c1;if(hi.rank===lo.rank)return hi.rank+lo.rank;return hi.rank+lo.rank+(c1.suit===c2.suit?'s':'o');}
function decodeKey(k){if(k.length===2)return[{rank:k[0],suit:'s'},{rank:k[0],suit:'h'}];return[{rank:k[0],suit:'s'},{rank:k[1],suit:k[2]==='s'?'s':'h'}];}
function drawFrom(rs,tries=50){for(let t=0;t<tries;t++){const d=mkDeck();if(rs.has(hkey(d[0],d[1])))return[d[0],d[1]];}return decodeKey(rnd([...rs]));}
function drawBoard(hc,n){const used=new Set(hc.map(c=>c.rank+c.suit));return mkDeck().filter(c=>!used.has(c.rank+c.suit)).slice(0,n);}
function drawPLO(tiers){const pool=[];tiers.forEach(t=>{if(PLO_TIERS[t])pool.push(...PLO_TIERS[t]);});const tmpl=rnd(pool);const used=new Set();const cards=tmpl.ranks.map(r=>{const s=SUITS.find(s=>!used.has(r+s))||'s';used.add(r+s);return{rank:r,suit:s};});return{cards,desc:tmpl.desc,handName:tmpl.h};}
function bStr(b){return b.map(c=>c.rank+SYM[c.suit]).join(' ');}
function parseDollar(s){return parseFloat((s||'0').replace(/[^0-9.]/g,''))||0;}
function boardTex(b){const sc={s:0,h:0,d:0,c:0};b.forEach(c=>sc[c.suit]++);const maxS=Math.max(...Object.values(sc));const ri=b.map(c=>RI[c.rank]).sort((a,z)=>a-z);const span=ri[ri.length-1]-ri[0];if(maxS>=2&&span<=4)return'wet';if(maxS>=2||span<=4)return'semi-wet';return'dry';}
function nlStr(c1,c2,board){const bR=board.map(c=>c.rank);const bI=board.map(c=>RI[c.rank]);const allS=[c1.suit,c2.suit,...board.map(c=>c.suit)];if(bR.filter(r=>r===c1.rank).length>=2||bR.filter(r=>r===c2.rank).length>=2)return'monster';if(bR.includes(c1.rank)&&bR.includes(c2.rank))return'strong';if(bR.includes(c1.rank)||bR.includes(c2.rank)){const topB=Math.max(...bI);const hr=bR.includes(c1.rank)?c1.rank:c2.rank;return RI[hr]===topB&&(RI[c1.rank]>=10||RI[c2.rank]>=10)?'strong':'medium';}if([c1.suit,c2.suit].some(s=>allS.filter(x=>x===s).length>=3))return'draw';const combo=[...new Set([RI[c1.rank],RI[c2.rank],...bI])].sort((a,z)=>a-z);for(let i=0;i<=combo.length-4;i++){if(combo[i+3]-combo[i]===3)return'draw';}return'weak';}
function buildPos(n){return['UTG','UTG+1','MP','HJ','CO','BTN','SB','BB'].slice(0,n);}
function buildStacks(n,itr){const base=itr?rnd([5000,8000,10000,15000]):rnd([200,300,500]);return Array.from({length:n},()=>{const v=base*(0.7+Math.random()*0.8);return itr?Math.round(Math.max(1000,v)).toLocaleString():'$'+Math.round(Math.max(50,v));});}

// ── Option deduplication ───────────────────────────────
// Returns the primary verb of an action label for dedup
function primaryVerb(s){
  const w=s.trim().split(/\s+/);
  // "3-bet", "4-bet", "Check-raise" are compound — use first two words as key
  if(w[0].match(/^\d+-bet$/i)||w[0].toLowerCase()==='check-raise'||w[0].toLowerCase()==='iso-raise'||w[0].toLowerCase()==='pot-raise') return w[0].toLowerCase();
  return w[0].toLowerCase();
}
function dedupOptions(correct, wrongPool){
  const cv=primaryVerb(correct);
  const used=new Set([correct.toLowerCase()]);
  const out=[];
  for(const o of wrongPool){
    if(used.has(o.toLowerCase()))continue;
    if(primaryVerb(o)===cv)continue; // same action as correct
    used.add(o.toLowerCase());
    out.push(o);
    if(out.length===3)break;
  }
  // pad with safe fallbacks if needed
  const fallbacks=[FOLD,CALL,CHECK,BET50,BET66,BET33,SHOVE].filter(f=>primaryVerb(f)!==cv&&!used.has(f.toLowerCase()));
  while(out.length<3&&fallbacks.length) out.push(fallbacks.shift());
  return out.slice(0,3);
}

// ── Wrong option pools (all standard terminology) ──────
function pfWrongPool(itr, bb){
  return[
    raiseTo(Math.round(bb*2.5),itr),
    raiseTo(Math.round(bb*3),itr),
    raiseTo(Math.round(bb*4),itr),
    threeBet(Math.round(bb*7),itr),
    threeBet(Math.round(bb*9),itr),
    threeBet(Math.round(bb*12),itr),
    fourBet(Math.round(bb*18),itr),
    fourBet(Math.round(bb*22),itr),
    isoRaise(Math.round(bb*4),itr),
    isoRaise(Math.round(bb*5),itr),
    CALL, FOLD, SHOVE
  ];
}
function pfWrong(correct, itr, bb){ return dedupOptions(correct, sfl(pfWrongPool(itr,bb))); }

function postWrongPool(type){
  const shared=[BET33,BET50,BET66,BET75,BET100,BET150,CHECK,CALL,FOLD,CHECKRAISE,CHECKRAISESHOVE,SHOVE];
  return shared;
}
function postWrong(correct, type){ return dedupOptions(correct, sfl(postWrongPool(type))); }

// PLO-specific pools
function ploWrongPool(itr, bb, type){
  if(type==='preflop') return[
    potRaise(Math.round(bb*3.5),itr),
    potRaise(Math.round(bb*5),itr),
    threeBetPot(Math.round(bb*11),itr),
    threeBetPot(Math.round(bb*14),itr),
    CALL, FOLD, SHOVE
  ];
  return[BET33,BET50,BET66,BET100,BET150,CHECK,CALL,FOLD,CHECKRAISE,CHECKRAISESHOVE,SHOVE];
}
function ploWrong(correct, itr, bb, type){ return dedupOptions(correct, sfl(ploWrongPool(itr,bb,type))); }

// ── Scenario builders ──────────────────────────────────
function buildScenario(cat, game, itr){
  const bb=itr?100:2;
  const stack=itr?rnd([20,30,40,50,60,80,100])*bb:rnd([100,150,200,300,500]);
  const stackStr=itr?stack+'bb':'$'+stack;
  const blindStr=itr?'50/100':'1/2';
  const seats=rnd([6,6,6,8,9]);
  const allPos=buildPos(seats);
  const ctx={itr,bb,stack,stackStr,blindStr,seats,allPos};
  if(game==='plo'){
    const pool=cat==='preflop'?PLO_PF:(cat==='bluffing'?PLO_POST.filter(t=>t.cat==='bluffing'):PLO_POST.filter(t=>t.cat==='postflop'));
    return{...rnd(pool.length?pool:PLO_POST).build(ctx),game:'PLO',variant:'PLO'};
  }
  const pool=cat==='preflop'?NLH_PF:(cat==='bluffing'?NLH_POST.filter(t=>t.cat==='bluffing'):NLH_POST.filter(t=>t.cat==='postflop'));
  return{...rnd(pool.length?pool:NLH_POST).build(ctx),game:'NLH',variant:"Texas Hold'em"};
}

async function callClaude(sys,msg,max){
  const key=getKey();if(!key)throw new Error('No API key.');
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:max||900,system:sys,messages:[{role:'user',content:msg}]})});

}

// ── Fetch Quiz ─────────────────────────────────────────
async function fetchQuiz(){
  if(!state.user)return;
  state.loading=true;state.quiz=null;state.selected=null;state.hintUsed=false;state.hint=null;
  renderQuiz();
  try{
    const itr=state.format==='tournament';
    const game=state.variant==='mixed'?(Math.random()>0.5?'plo':'nlh'):state.variant==='plo'?'plo':'nlh';
    const ctx=buildScenario(state.cat,game,itr);
    // Options are already clean standard poker terms — no stripping needed
    const allOpts=sfl([ctx.correct,...ctx.wrong].slice(0,4));
    const correctIdx=allOpts.indexOf(ctx.correct);
    const diffDesc={Beginner:'Simple explanation.',Intermediate:'Reference position, ranges, pot odds.',Advanced:'GTO-level: MDF, polarization, blockers, frequencies.'}[state.difficulty]||'';
    const isPLO=game==='plo';
    const sys=`You are an expert ${isPLO?'PLO':'NL Hold\'em'} GTO poker coach. The hand, preflop action, and correct answer are already determined. Write a 2-sentence scenario description and 3-4 sentence GTO explanation. Use standard poker terminology only. DO NOT invent or change any action. Villain: ${state.villain}. ${diffDesc}${isPLO?' Reference PLO concepts: wraps, nut flush draws, multi-way equity.':''} Respond ONLY valid JSON: {"scenario":"2 sentences","explanation":"3-4 sentences","hintText":"1 sentence hint"}`;
    const prompt=`Game: ${ctx.variant}. Format: ${itr?'Tournament':'Cash'}.\nHero: ${ctx.heroPos}. Cards: ${ctx.cards.map(c=>c.rank+c.suit).join(' ')} (${ctx.key}).\nContext: ${ctx.pfCtx}\nHistory: ${ctx.pfHist}\nBoard: ${ctx.board&&ctx.board.length?bStr(ctx.board):'(preflop)'}\nCorrect answer: ${ctx.correct}\nOther options shown: ${ctx.wrong.join(' / ')}\nRange note: ${ctx.rangeNote}`;
    const txt=await callClaude(sys,prompt,800);
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    const potAmt=parseDollar(ctx.pot||'0');
    const callAmt=parseDollar(ctx.callAmt||'0');
    const ratio=callAmt>0?((potAmt+callAmt)/callAmt).toFixed(1)+':1':'N/A';
    const bePct=callAmt>0?Math.round((callAmt/(potAmt+callAmt))*100)+'%':'N/A';
    state.quiz={
      variant:ctx.variant,gameType:itr?'Tournament':'Cash Game',
      street:ctx.street,heroPosition:ctx.heroPos,
      numSeats:ctx.seats,allPositions:ctx.allPos,
      stackSizes:buildStacks(ctx.seats,itr),bets:{},
      potDisplay:ctx.pot,blinds:ctx.blindStr,
      holeCards:ctx.cards,communityCards:ctx.board||[],
      scenario:parsed.scenario,question:'What is the correct GTO action?',
      options:allOpts,correctIndex:correctIdx,
      explanation:parsed.explanation,hintText:parsed.hintText,
      rangeNote:ctx.rangeNote,actionLabel:ctx.label,
      potOdds:callAmt>0?{potSize:ctx.pot,callAmount:'$'+callAmt,oddsRatio:ratio,breakEvenPct:bePct,impliedOdds:isPLO?'Massive with wraps + flush draws':'Consider stack depth',recommendation:callAmt/(potAmt+callAmt)<0.33?'Fold':'Call'}:null
    };
  }catch(e){state.quiz={error:true,msg:e.message||'Unknown error'};}
  state.loading=false;renderQuiz();
}

// ── SVG card renderer ──────────────────────────────────
function cardSVG(rank,suit,x,y,w,h){
  const isRed=suit==='h'||suit==='d';
  const col=isRed?'#dc2626':'#1e293b';
  const sym=SYM[suit]||suit;
  const rs=Math.round(w*0.30);
  const fs=Math.round(w*0.42);
  const rx=Math.round(w*0.13);
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="${x+3}" y="${y+rs+1}" font-size="${rs}" font-weight="800" fill="${col}" font-family="Georgia,serif">${rank}</text>
    <text x="${x+w/2}" y="${y+h*0.63}" font-size="${fs}" text-anchor="middle" dominant-baseline="middle" fill="${col}">${sym}</text>
    <text x="${x+w-3}" y="${y+h-3}" font-size="${rs}" font-weight="800" fill="${col}" font-family="Georgia,serif" text-anchor="end" transform="rotate(180,${x+w-3},${y+h-3})">${rank}</text>`;
}

// ── Table + card strip renderer ────────────────────────
function tableHTML(quiz){
  const W=620,H=340;
  const cx=W/2,cy=158,rx=208,ry=98;
  const seats=quiz.numSeats||6;
  const posLabels=quiz.allPositions||buildPos(seats);
  const heroPos=quiz.heroPosition||'';
  const stacks=quiz.stackSizes||[];
  const holeCards=quiz.holeCards||[];
  const cc=quiz.communityCards||[];
  const isPLO=holeCards.length===4;
  const HERO_R=24;
  let inner=`
    <ellipse cx="${cx}" cy="${cy+8}" rx="${rx+10}" ry="${ry+10}" fill="rgba(0,0,0,0.35)"/>
    <ellipse cx="${cx}" cy="${cy}" rx="${rx+12}" ry="${ry+12}" fill="#1a4a2e"/>
    <ellipse cx="${cx}" cy="${cy}" rx="${rx+6}" ry="${ry+6}" fill="#1e5c38"/>
    <ellipse cx="${cx}" cy="${cy}" rx="${rx-4}" ry="${ry-4}" fill="#2d7a4a"/>`;
  if(cc.length>0){
    const bw=34,bh=48,bgap=5;
    const tw=cc.length*bw+(cc.length-1)*bgap;
    const sx=cx-tw/2,sy=cy-bh/2;
    cc.forEach((c,i)=>{inner+=cardSVG(c.rank,c.suit,sx+i*(bw+bgap),sy,bw,bh);});
    if(quiz.potDisplay&&quiz.potDisplay!=='$0')
      inner+=`<text x="${cx}" y="${sy-9}" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700" font-family="monospace">POT ${quiz.potDisplay}</text>`;
  }else if(quiz.potDisplay&&quiz.potDisplay!=='$0'){
    inner+=`<rect x="${cx-48}" y="${cy-15}" width="96" height="30" rx="8" fill="rgba(0,0,0,0.45)"/>
      <text x="${cx}" y="${cy-1}" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="600" font-family="monospace">POT</text>
      <text x="${cx}" y="${cy+13}" text-anchor="middle" fill="#fef3c7" font-size="13" font-weight="700" font-family="monospace">${quiz.potDisplay}</text>`;
  }
  Array.from({length:seats},(_,i)=>{
    const a=(2*Math.PI*i/seats)+Math.PI/2;
    const sx=Math.round(cx+(rx+32)*Math.cos(a));
    const sy=Math.round(cy+(ry+42)*Math.sin(a));
    const label=posLabels[i]||'';
    const isHero=label===heroPos;
    const isBtn=label==='BTN';
    const stack=stacks[i]||'';
    inner+=`<circle cx="${sx}" cy="${sy}" r="${isHero?HERO_R:20}" fill="${isHero?'#0d2a1a':'#0a0a0a'}" stroke="${isHero?'#1a9a9a':'#2a2a2a'}" stroke-width="${isHero?2.5:1.5}"/>`;
    if(isBtn)inner+=`<circle cx="${sx+19}" cy="${sy-19}" r="9" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/><text x="${sx+19}" y="${sy-15}" text-anchor="middle" fill="#1c1917" font-size="9" font-weight="800">D</text>`;
    if(isHero)inner+=`<text x="${sx}" y="${sy-13}" text-anchor="middle" fill="#1a9a9a" font-size="8" font-weight="700">YOU</text>`;
    inner+=`<text x="${sx}" y="${sy+5}" text-anchor="middle" fill="${isHero?'#1a9a9a':'#aaa'}" font-size="${isHero?10:9}" font-weight="700">${label}</text>`;
    if(stack)inner+=`<text x="${sx}" y="${sy+(isHero?40:34)}" text-anchor="middle" fill="#86efac" font-size="9" font-family="monospace">${stack}</text>`;
  });
  const tableSVG=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">${inner}</svg>`;
  // Hero cards in dedicated strip below table
  let cardsHTML='';
  if(holeCards.length>0){
    const cw=isPLO?54:68,ch=isPLO?78:97;
    cardsHTML=`<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px;background:#050505;border-top:1px solid #1a9a9a44">
      <div style="font-size:10px;color:#1a9a9a;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-right:4px;white-space:nowrap">Your Hand</div>
      ${holeCards.map(c=>{
        const isRed=c.suit==='h'||c.suit==='d';
        const col=isRed?'#dc2626':'#1e293b';
        const sym=SYM[c.suit]||c.suit;
        const rs=isPLO?13:16,fs=isPLO?20:26;
        return`<div style="width:${cw}px;height:${ch}px;border-radius:8px;background:#fff;border:2px solid #94a3b8;display:inline-flex;flex-direction:column;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.5);overflow:hidden;flex-shrink:0">
          <span style="font-size:${rs}px;font-weight:900;color:${col};line-height:1;padding:3px 4px;font-family:Georgia,serif">${c.rank}</span>
          <span style="font-size:${fs}px;color:${col};line-height:1;position:absolute;top:50%;left:50%;transform:translate(-50%,-52%)">${sym}</span>
          <span style="font-size:${rs}px;font-weight:900;color:${col};line-height:1;padding:3px 4px;font-family:Georgia,serif;position:absolute;bottom:2px;right:4px;transform:rotate(180deg)">${c.rank}</span>
        </div>`;
      }).join('')}
    </div>`;
  }
  return`<div style="max-width:620px;margin:0 auto;border-radius:12px;overflow:hidden;border:1px solid #1a1a1a">${tableSVG}${cardsHTML}</div>`;
}

    html+=`<button class="${cls}" onclick="answer(${i})"><span style="font-weight:700;font-size:10px;opacity:0.7;flex-shrink:0">${icon}</span>${opt}</button>`;

function answer(idx){
  if(state.selected!==null||!state.quiz||state.quiz.error)return;
  state.selected=idx;const ok=idx===state.quiz.correctIndex;
  state.streak=ok?state.streak+1:0;
  const p=state.user;if(!p)return;
  p.totalQ=(p.totalQ||0)+1;p.totalCorrect=(p.totalCorrect||0)+(ok?1:0);
  p.streakBest=Math.max(p.streakBest||0,state.streak);
  const cat=state.cat;
  p.cats=p.cats||{preflop:{q:0,c:0},postflop:{q:0,c:0},bluffing:{q:0,c:0}};
  p.cats[cat]=p.cats[cat]||{q:0,c:0};p.cats[cat].q++;if(ok)p.cats[cat].c++;
  p.history=[...((p.history||[]).slice(-199)),{ts:Date.now(),cat,correct:ok,q:(state.quiz.question||'').slice(0,60)}];
  p.handLog=[...((p.handLog||[]).slice(-499)),{ts:Date.now(),cat,correct:ok,question:state.quiz.question,yourAnswer:state.quiz.options?.[idx]}];
  persistUser();
  if(state.sessionMode){state.sessionAnswers.push({correct:ok,question:state.quiz.question});state.sessionCount++;const b=document.getElementById('session-btn');if(b)b.textContent=state.sessionCount+'/10';if(state.sessionCount>=10)setTimeout(showSessionReport,400);}
  renderQuiz();
}
async function getHint(){
  const q=state.quiz;if(!q||state.hintUsed)return;
  if(q.hintText){state.hint=q.hintText;state.hintUsed=true;renderQuiz();return;}
  state.hintUsed=true;renderQuiz();
  try{const t=await callClaude('Give ONE short GTO poker hint (1 sentence) without revealing the answer.','Hand: '+JSON.stringify({holeCards:q.holeCards,scenario:q.scenario,rangeNote:q.rangeNote}),200);state.hint=t.replace(/```/g,'').trim();}
  catch{state.hint='Consider your position, range advantage, and pot odds.';}
  renderQuiz();
}

  [{l:'Correct',v:c,c:'#4ade80'},{l:'Wrong',v:a.length-c,c:'#f87171'},{l:'Accuracy',v:pct+'%',c:col}].forEach(s=>{html+=`<div style="flex:1;background:#111;border-radius:10px;padding:10px;border:1px solid #1a1a1a;text-align:center"><div style="font-size:10px;color:#333;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px">${s.l}</div><div style="font-size:18px;font-weight:700;color:${s.c}">${s.v}</div></div>`;});
  html+=`</div><button class="btn" onclick="closeOverlay();state.sessionMode=false;state.sessionCount=0;state.sessionAnswers=[];document.getElementById('session-btn').textContent='Session (10)';fetchQuiz()">Back to Training</button>`;
  document.getElementById('overlay-content').innerHTML=html;document.getElementById('overlay').style.display='flex';
}

  html+=`</div>`;
  const leaks=['preflop','postflop','bluffing'].filter(c=>(p.cats?.[c]?.q||0)>=3&&Math.round(((p.cats[c].c||0)/(p.cats[c].q||1))*100)<60);
  const strengths=['preflop','postflop','bluffing'].filter(c=>(p.cats?.[c]?.q||0)>=3&&Math.round(((p.cats[c].c||0)/(p.cats[c].q||1))*100)>=70);
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:rgba(248,113,113,0.06);border-radius:10px;padding:11px;border:1px solid rgba(248,113,113,0.15)"><div style="font-size:10px;color:#f87171;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px">Leaks</div>${leaks.length?leaks.map(c=>`<div style="font-size:12px;color:#fca5a5;margin-bottom:3px;text-transform:capitalize">${c}</div>`).join(''):'<div style="font-size:12px;color:#222">None yet</div>'}</div><div style="background:rgba(74,222,128,0.06);border-radius:10px;padding:11px;border:1px solid rgba(74,222,128,0.15)"><div style="font-size:10px;color:#4ade80;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px">Strengths</div>${strengths.length?strengths.map(c=>`<div style="font-size:12px;color:#86efac;margin-bottom:3px;text-transform:capitalize">${c}</div>`).join(''):'<div style="font-size:12px;color:#222">Keep playing!</div>'}</div></div>`;
  document.getElementById('overlay-content').innerHTML=html;document.getElementById('overlay').style.display='flex';
}

async function analyzeHand(){

    const t=await callClaude(sys,'Analyze:\n\n'+txt,1500);
    const r=JSON.parse(t.replace(/```json|```/g,'').trim());
    const gc={A:'#4ade80',B:'#86efac',C:'#facc15',D:'#f87171'};const vc={Good:'#4ade80',Okay:'#facc15',Mistake:'#f87171'};

    (r.streets||[]).forEach(s=>{html+=`<div style="background:#111;border-radius:10px;border:1px solid #1a1a1a;padding:10px 12px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span style="font-size:11px;font-weight:700;color:#444;min-width:52px">${s.street}</span><span style="font-size:10px;padding:2px 7px;border-radius:6px;background:${vc[s.verdict]||'#555'}22;color:${vc[s.verdict]||'#555'};font-weight:600">${s.verdict}</span><span style="font-size:13px;font-weight:800;color:${gc[s.grade]||'#fff'};margin-left:auto">${s.grade}</span></div><div style="font-size:12px;color:#555;font-style:italic;margin-bottom:3px">${s.action}</div><div style="font-size:12px;color:#888;line-height:1.7">${s.analysis}</div>${s.alternative?`<div style="font-size:12px;color:#1a9a9a;background:rgba(26,154,154,0.06);border-radius:7px;padding:5px 8px;border:1px solid #1a9a9a33;margin-top:5px">GTO alt: ${s.alternative}</div>`:''}</div>`;});
    if(r.studyTip)html+=`<div style="background:rgba(26,154,154,0.06);border-radius:10px;padding:10px;border:1px solid #1a9a9a33;margin-bottom:10px"><div style="font-size:10px;color:#1a9a9a;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px">GTO Tip</div><div style="font-size:13px;color:#888;line-height:1.7">${r.studyTip}</div></div>`;
    html+=`<button class="btn-sm" onclick="document.getElementById('hand-result').innerHTML='';document.getElementById('hand-txt').value=''" style="margin-bottom:10px">Analyze Another</button>`;
    if(res)res.innerHTML=html;
  }catch(e){if(res)res.innerHTML=`<div style="color:#f87171;font-size:13px;margin-bottom:10px">Failed: ${e.message}</div>`;}
}
function renderEquityCalc(){
  return`<div style="display:flex;flex-direction:column;gap:12px"><div style="background:rgba(26,154,154,0.06);border-radius:8px;padding:8px 10px;border:1px solid #1a9a9a22;font-size:11px;color:#555">NLH (2 cards) or PLO (4 cards). E.g. <span style="color:#1a9a9a">Ah Kd Qs Jc</span> for PLO.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><div style="font-size:11px;color:#444;margin-bottom:4px">Hand 1</div><input class="inp" id="eq-h1" value="Ah Kd"/></div><div><div style="font-size:11px;color:#444;margin-bottom:4px">Hand 2</div><input class="inp" id="eq-h2" value="Qh Qc"/></div></div>
    <div><div style="font-size:11px;color:#444;margin-bottom:4px">Board (optional)</div><input class="inp" id="eq-board" placeholder="Kc 7h 2d"/></div>
    <button class="btn" onclick="calcEquity()">Calculate Equity</button><div id="eq-result"></div></div>`;
}
async function calcEquity(){
  const h1=document.getElementById('eq-h1')?.value||'',h2=document.getElementById('eq-h2')?.value||'',board=document.getElementById('eq-board')?.value||'';
  const res=document.getElementById('eq-result');if(!res)return;
  const isPLO=h1.trim().split(/\s+/).length>=4;
  res.innerHTML='<div style="color:#444;font-size:13px">Calculating...</div>';
  try{
    const t=await callClaude(`${isPLO?'PLO':'NLH'} equity calculator. Respond ONLY valid JSON: {"hand1":{"cards":"","equity":47.3,"description":""},"hand2":{"cards":"","equity":52.7,"description":""},"ties":0.0,"analysis":"2-3 sentences."}`,`Hand 1: ${h1}\nHand 2: ${h2}\nBoard: ${board||'none'}`,600);
    const r=JSON.parse(t.replace(/```json|```/g,'').trim());
    let html='';
    [{h:r.hand1,col:'#7dd3fc'},{h:r.hand2,col:'#f9a8d4'}].forEach(item=>{html+=`<div style="background:#111;border-radius:10px;padding:11px;border:1px solid #1a1a1a;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:13px;font-family:monospace;color:${item.col};font-weight:700">${item.h.cards}</span><span style="font-size:18px;font-weight:800;color:${item.h.equity>=50?'#4ade80':'#f87171'}">${item.h.equity}%</span></div><div style="height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden"><div style="width:${item.h.equity}%;height:100%;background:${item.h.equity>=50?'#4ade80':'#f87171'};border-radius:3px"></div></div><div style="font-size:11px;color:#333;margin-top:5px">${item.h.description}</div></div>`;});
    html+=`<div style="background:rgba(26,154,154,0.06);border-radius:10px;padding:11px;border:1px solid #1a9a9a33;font-size:12px;color:#666;line-height:1.7">${r.analysis}</div>`;
    res.innerHTML=html;
  }catch(e){res.innerHTML=`<div style="color:#f87171;font-size:13px">Failed: ${e.message}</div>`;}
}
function renderBankroll(){
  const id=state.user?.id;if(!id)return'';
  const sessions=S.get('upc:br:'+id)||[];
  const total=sessions.reduce((a,s)=>a+s.profit,0);
  const wins=sessions.filter(s=>s.profit>0).length;
  let html=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">`;
  [{l:'Profit',v:(total>=0?'+':'')+total.toFixed(2),c:total>=0?'#4ade80':'#f87171'},{l:'Sessions',v:sessions.length,c:'#1a9a9a'},{l:'Win Rate',v:sessions.length?Math.round((wins/sessions.length)*100)+'%':'—',c:'#facc15'}].forEach(s=>{html+=`<div style="background:#111;border-radius:10px;padding:10px;border:1px solid #1a1a1a"><div style="font-size:10px;color:#333;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px">${s.l}</div><div style="font-size:16px;font-weight:700;color:${s.c}">${s.v}</div></div>`;});
  html+=`</div><div style="background:#111;border-radius:12px;padding:12px;border:1px solid #1a1a1a;margin-bottom:12px"><div style="font-size:10px;color:#333;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">Log Session</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><div style="font-size:10px;color:#333;margin-bottom:3px">Date</div><input type="date" id="br-date" value="${new Date().toISOString().slice(0,10)}" class="inp"/></div><div><div style="font-size:10px;color:#333;margin-bottom:3px">Game</div><input id="br-game" placeholder="1/2 NL" class="inp"/></div><div><div style="font-size:10px;color:#333;margin-bottom:3px">Buy-in</div><input type="number" id="br-buyin" placeholder="200" class="inp"/></div><div><div style="font-size:10px;color:#333;margin-bottom:3px">Cash-out</div><input type="number" id="br-cashout" placeholder="350" class="inp"/></div></div>
    <input id="br-notes" placeholder="Notes..." class="inp" style="margin-bottom:8px"/>
    <button class="btn" onclick="addSession()">Add Session</button></div>
  <div style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto">`;
  [...sessions].reverse().forEach(s=>{html+=`<div style="display:flex;align-items:center;gap:8px;background:#111;border-radius:8px;padding:8px 10px;border:1px solid #1a1a1a"><div style="flex:1"><div style="font-size:12px;color:#fff;font-weight:600">${s.date}${s.game?' · '+s.game:''}</div>${s.notes?`<div style="font-size:11px;color:#333">${s.notes}</div>`:''}</div><div style="font-size:13px;font-weight:700;color:${s.profit>=0?'#4ade80':'#f87171'}">${s.profit>=0?'+':''}${s.profit.toFixed(2)}</div></div>`;});
  if(!sessions.length)html+=`<div style="font-size:12px;color:#222;text-align:center;padding:20px">No sessions yet.</div>`;
  html+=`</div>`;return html;
}
function addSession(){
  const id=state.user?.id;if(!id)return;
  const buyin=parseFloat(document.getElementById('br-buyin')?.value||'0');
  const cashout=parseFloat(document.getElementById('br-cashout')?.value||'0');
  if(!buyin||!cashout)return;
  const sessions=S.get('upc:br:'+id)||[];
  sessions.push({id:Date.now(),date:document.getElementById('br-date')?.value||'',game:document.getElementById('br-game')?.value||'',buyin,cashout,profit:cashout-buyin,notes:document.getElementById('br-notes')?.value||''});
  sessions.sort((a,b)=>new Date(a.date)-new Date(b.date));
  S.set('upc:br:'+id,sessions);setTool('bankroll');
}
function renderHandLog(){
  const log=(state.user?.handLog||[]).slice().reverse();
  let html=`<input class="inp" id="hl-search" placeholder="Search hands..." oninput="filterHandLog(this.value)" style="margin-bottom:10px"/><div id="hl-list" style="display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto">`;
  log.forEach(h=>{html+=`<div style="background:#111;border-radius:8px;padding:9px 11px;border:1px solid #1a1a1a"><div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><span style="color:${h.correct?'#4ade80':'#f87171'};font-size:11px">${h.correct?'✓':'✗'}</span><span style="font-size:10px;padding:1px 7px;border-radius:7px;background:rgba(255,255,255,0.04);color:#333;text-transform:capitalize">${h.cat}</span><span style="font-size:10px;color:#1e1e1e;margin-left:auto">${new Date(h.ts).toLocaleDateString()}</span></div><div style="font-size:12px;color:#666;line-height:1.5">${h.question||''}</div>${h.yourAnswer?`<div style="font-size:11px;color:${h.correct?'#86efac':'#fca5a5'};margin-top:3px">You: ${h.yourAnswer}</div>`:''}</div>`;});
  if(!log.length)html+=`<div style="font-size:12px;color:#222;text-align:center;padding:20px">No hands logged yet.</div>`;
  html+=`</div>`;return html;
}
function filterHandLog(q){
  q=(q||'').toLowerCase();
  const log=(state.user?.handLog||[]).filter(h=>(h.question||'').toLowerCase().includes(q)).reverse();
  const list=document.getElementById('hl-list');if(!list)return;
  let html='';
  log.forEach(h=>{html+=`<div style="background:#111;border-radius:8px;padding:9px 11px;border:1px solid #1a1a1a"><div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><span style="color:${h.correct?'#4ade80':'#f87171'};font-size:11px">${h.correct?'✓':'✗'}</span><span style="font-size:10px;padding:1px 7px;border-radius:7px;background:rgba(255,255,255,0.04);color:#333;text-transform:capitalize">${h.cat}</span></div><div style="font-size:12px;color:#666;line-height:1.5">${h.question||''}</div></div>`;});
  list.innerHTML=html||`<div style="font-size:12px;color:#222;text-align:center;padding:20px">No results.</div>`;
}
function closeOverlay(){document.getElementById('overlay').style.display='none';}
</script>
