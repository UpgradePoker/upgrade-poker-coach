<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
// ── Gate ─────────────────────────────────────────────────────────
function handleGate() {
  var key = (document.getElementById("api-input").value || "").trim();
  var err = document.getElementById("gate-error");
  err.style.display = "none";
  if (!key) { err.textContent = "Please enter your API key."; err.style.display = "block"; return; }
  if (!key.startsWith("sk-ant-")) { err.textContent = "Invalid key — should start with sk-ant-"; err.style.display = "block"; return; }
  localStorage.setItem("upc_api_key", key);
  document.getElementById("api-gate").style.display = "none";
  document.getElementById("root").style.display = "block";
}

window.addEventListener("DOMContentLoaded", function() {
  var saved = localStorage.getItem("upc_api_key");
  if (saved && saved.startsWith("sk-ant-")) {
    document.getElementById("api-gate").style.display = "none";
    document.getElementById("root").style.display = "block";
  }
  var inp = document.getElementById("api-input");
  if (inp) inp.addEventListener("keydown", function(e) { if (e.key === "Enter") handleGate(); });
});

function getApiKey() { return localStorage.getItem("upc_api_key") || ""; }
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const STREET_CATS = [{id:"preflop",label:"Preflop"},{id:"postflop",label:"Postflop"},{id:"bluffing",label:"Bluffing"}];
const RANKS = ["2","3","4","5","6","7","8","9","T","J","Q","K","A"];
const SUITS = ["s","h","d","c"];
const SUIT_SYM = {s:"♠",h:"♥",d:"♦",c:"♣"};
const SUIT_COL = {s:"#1e293b",h:"#dc2626",d:"#dc2626",c:"#1e293b"};
const DIFFICULTIES = ["Beginner","Intermediate","Advanced"];
const ARCHETYPES = ["Nit","TAG","LAG","Fish","Calling Station","Maniac","GTO Reg"];
const POS8 = ["UTG","UTG+1","UTG+2","MP","HJ","CO","SB","BTN"];

// ── Brand Colors ──────────────────────────────────────────────────
const TEAL       = "#1a9a9a";
const TEAL_DARK  = "#0d7a7a";
const TEAL_DIM   = "#1a9a9a44";
const BG         = "#000";
const BG2        = "#0a0a0a";
const BG3        = "#111";
const BG4        = "#161616";
const BORDER     = "#1e1e1e";
const BORDER_T   = "#1a9a9a55";
const MUTED      = "#555";
const TEXT       = "#fff";
const TEXT2      = "#aaa";
const TEXT3      = "#666";
const stor = {
  get: k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} }
};
const loadUsers    = () => stor.get("upc:users") || [];
const saveUsers    = u  => stor.set("upc:users", u);
const loadProfile  = id => stor.get("upc:profile:"+id) || null;
const saveProfile  = (id,d) => stor.set("upc:profile:"+id, d);
const loadBankroll = id => stor.get("upc:bankroll:"+id) || [];
const saveBankroll = (id,d) => stor.set("upc:bankroll:"+id, d);

function emptyCats() { return {preflop:{q:0,c:0},postflop:{q:0,c:0},bluffing:{q:0,c:0}}; }
function emptyProfile(name) {
  return { name, createdAt:Date.now(), lastSeen:Date.now(), sessions:0,
    totalQ:0, totalCorrect:0,
    byVariant:{ holdem:{totalQ:0,totalCorrect:0,cats:emptyCats()}, omaha:{totalQ:0,totalCorrect:0,cats:emptyCats()} },
    cats:emptyCats(), history:[], streakBest:0, handLog:[] };
}

// ── Deck ──────────────────────────────────────────────────────────
function shuffleDeck() {
  const d = RANKS.flatMap(r => SUITS.map(s => ({rank:r,suit:s})));
  for (let i=d.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [d[i],d[j]]=[d[j],d[i]]; }
  return d;
}
function classifyHand(c1,c2) {
  const r1=RANKS.indexOf(c1.rank),r2=RANKS.indexOf(c2.rank);
  const isPair=c1.rank===c2.rank,isSuited=c1.suit===c2.suit;
  const hi=Math.max(r1,r2),lo=Math.min(r1,r2),gap=hi-lo;
  if(isPair&&hi>=10) return "premium pair JJ-AA";
  if(isPair&&hi>=7)  return "medium pair 88-TT";
  if(isPair)         return "small pair 22-77";
  if(hi>=12&&lo>=11) return "premium broadway";
  if(hi===12&&lo>=9&&isSuited) return "strong suited ace";
  if(hi===12&&lo>=9) return "offsuit big ace";
  if(hi===12)        return "weak ace - often fold";
  if(gap<=1&&isSuited&&hi>=7) return "suited connector";
  if(gap<=3&&isSuited) return "suited gapper";
  if(hi>=10&&lo>=9)  return "offsuit broadway";
  if(hi<=5)          return "trash - correct answer is fold";
  return "marginal hand";
}

// ── API ───────────────────────────────────────────────────────────
async function callClaude(system, userMsg, maxTokens=1200) {
  const key = getApiKey();
  if (!key) throw new Error("No API key. Please refresh and enter your key.");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages:[{role:"user",content:userMsg}] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message + " ("+data.error.type+")");
  if (!data.content) throw new Error("Unexpected response: " + JSON.stringify(data).slice(0,100));
  return data.content.map(i=>i.text||"").join("");
}

// ── UI Primitives ─────────────────────────────────────────────────
function Toggle({on,onChange,label}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>onChange(!on)}>
      <div style={{width:44,height:26,borderRadius:13,background:on?"#f59e0b":"#1e293b",border:"1px solid "+(on?"#d97706":"#334155"),position:"relative",transition:"all 0.2s",flexShrink:0}}>
        <div style={{position:"absolute",top:3,left:on?21:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
      </div>
      {label&&<span style={{fontSize:13,color:on?"#fbbf24":"#64748b",fontWeight:600,userSelect:"none"}}>{label}</span>}
    </div>
  );
}

function SegControl({options,value,onChange,color="#7c3aed"}) {
  return (
    <div style={{display:"inline-flex",borderRadius:10,overflow:"hidden",border:"1px solid #334155",flexShrink:0}}>
      {options.map((o,i)=>{
        const v=typeof o==="object"?o.value:o, l=typeof o==="object"?o.label:o, active=value===v;
        return <button key={v} onClick={()=>onChange(v)} style={{padding:"10px 20px",border:"none",borderRight:i<options.length-1?"1px solid #334155":"none",background:active?color:"transparent",color:active?"#fff":"#64748b",fontSize:13,fontWeight:active?700:400,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{l}</button>;
      })}
    </div>
  );
}

function CPRow({label,children,noBorder=false}) {
  return (
    <div style={{padding:"16px 20px",borderBottom:noBorder?"none":"1px solid #1e293b"}}>
      <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:1.5,marginBottom:12}}>{label}</div>
      {children}
    </div>
  );
}

// ── Card ──────────────────────────────────────────────────────────
function Card({rank,suit,size=1}) {
  const w=38*size,h=54*size,col=SUIT_COL[suit]||"#1e293b",sym=SUIT_SYM[suit]||suit;
  return (
    <div style={{width:w,height:h,borderRadius:5*size,background:"#fff",border:"1.5px solid #94a3b8",display:"flex",flexDirection:"column",padding:`${2*size}px ${3*size}px`,boxSizing:"border-box",position:"relative",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}>
      <span style={{fontSize:12*size,fontWeight:800,color:col,lineHeight:1,fontFamily:"Georgia,serif"}}>{rank}</span>
      <span style={{fontSize:16*size,color:col,lineHeight:1,position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}>{sym}</span>
      <span style={{fontSize:12*size,fontWeight:800,color:col,lineHeight:1,position:"absolute",bottom:2*size,right:3*size,transform:"rotate(180deg)",fontFamily:"Georgia,serif"}}>{rank}</span>
    </div>
  );
}

// ── Poker Table ───────────────────────────────────────────────────
function PokerTable({quiz,numSeats=8}) {
  const cx=300,cy=150,rx=220,ry=110,hero=numSeats-1;
  const pos=quiz?.allPositions||POS8.slice(0,numSeats);
  return (
    <div style={{width:"100%",maxWidth:600,margin:"0 auto"}}>
      <svg viewBox="0 0 600 300" style={{width:"100%",overflow:"visible"}}>
        <ellipse cx={cx} cy={cy+8} rx={rx+10} ry={ry+10} fill="rgba(0,0,0,0.35)"/>
        <ellipse cx={cx} cy={cy} rx={rx+12} ry={ry+12} fill="#1a4a2e"/>
        <ellipse cx={cx} cy={cy} rx={rx+6} ry={ry+6} fill="#1e5c38"/>
        <ellipse cx={cx} cy={cy} rx={rx-4} ry={ry-4} fill="#2d7a4a"/>
        <ellipse cx={cx} cy={cy} rx={rx-20} ry={ry-20} fill="none" stroke="#338a52" strokeWidth="1" strokeDasharray="4 6" opacity="0.4"/>
        {quiz?.potDisplay&&<><rect x={cx-46} y={cy-16} width={92} height={32} rx={8} fill="rgba(0,0,0,0.35)"/><text x={cx} y={cy-2} textAnchor="middle" fill="#fcd34d" fontSize={10} fontWeight={600} fontFamily="monospace">POT</text><text x={cx} y={cy+13} textAnchor="middle" fill="#fef3c7" fontSize={13} fontWeight={700} fontFamily="monospace">{quiz.potDisplay}</text></>}
        {quiz?.showCommunity&&quiz?.communityCards?.length>0&&(
          <foreignObject x={cx-110} y={cy-28} width={220} height={56}>
            <div xmlns="http://www.w3.org/1999/xhtml" style={{display:"flex",gap:3,justifyContent:"center",alignItems:"center",paddingTop:4}}>
              {quiz.communityCards.map((c,i)=><Card key={i} rank={c.rank} suit={c.suit} size={0.72}/>)}
            </div>
          </foreignObject>
        )}
        {Array(numSeats).fill(0).map((_,i)=>{
          const a=(2*Math.PI*i/numSeats)-Math.PI/2;
          const x=cx+(rx+28)*Math.cos(a),y=cy+(ry+38)*Math.sin(a);
          const isHero=i===hero,isDealer=quiz?.dealerSeat===i;
          return (
            <g key={i}>
              <circle cx={x} cy={y} r={isHero?26:20} fill={isHero?"#1e3a5f":"#0f172a"} stroke={isHero?"#60a5fa":"#334155"} strokeWidth={isHero?2:1.5}/>
              {isDealer&&<><circle cx={x+16} cy={y-16} r={8} fill="#fbbf24" stroke="#92400e" strokeWidth={1}/><text x={x+16} y={y-12} textAnchor="middle" fill="#1c1917" fontSize={8} fontWeight={700}>D</text></>}
              <text x={x} y={y+4} textAnchor="middle" fill={isHero?"#93c5fd":"#94a3b8"} fontSize={isHero?9:8} fontWeight={600}>{pos[i]}</text>
              {quiz?.stackSizes?.[i]&&<text x={x} y={y+(isHero?40:34)} textAnchor="middle" fill="#86efac" fontSize={8} fontFamily="monospace">{quiz.stackSizes[i]}</text>}
              {quiz?.bets?.[i]&&<g><circle cx={x+(x<cx?18:-18)} cy={y+(y<cy?18:-18)} r={10} fill="#e11d48" stroke="#fff" strokeWidth={1}/><text x={x+(x<cx?18:-18)} y={y+(y<cy?18:-18)+3} textAnchor="middle" fill="white" fontSize={7} fontWeight={700}>{quiz.bets[i]}</text></g>}
              {isHero&&<text x={x} y={y+52} textAnchor="middle" fill="#60a5fa" fontSize={8} fontWeight={700}>YOU</text>}
            </g>
          );
        })}
      </svg>
      {quiz?.holeCards?.length>0&&<div style={{display:"flex",justifyContent:"center",gap:8,marginTop:-10}}>{quiz.holeCards.map((c,i)=><Card key={i} rank={c.rank} suit={c.suit} size={1.15}/>)}</div>}
    </div>
  );
}

// ── Equity Calc ───────────────────────────────────────────────────
function EquityCalc() {
  const [h1,setH1]=useState("Ah Kd");const [h2,setH2]=useState("Qh Qc");const [board,setBoard]=useState("");const [result,setResult]=useState(null);const [loading,setLoading]=useState(false);
  const inp={width:"100%",padding:"9px 12px",borderRadius:8,background:"#050d1a",border:"1px solid #1e293b",color:"#e2e8f0",fontSize:13,boxSizing:"border-box",fontFamily:"monospace",outline:"none"};
  async function calc(){setLoading(true);setResult(null);try{const t=await callClaude(`Poker equity calculator. Respond ONLY valid JSON: {"hand1":{"cards":"Ah Kd","equity":47.3,"description":"AK high"},"hand2":{"cards":"Qh Qc","equity":52.7,"description":"Overpair"},"ties":0.5,"analysis":"2-3 sentences."}`,`Hand 1: ${h1}\nHand 2: ${h2}\nBoard: ${board||"none"}`);setResult(JSON.parse(t.replace(/```json|```/g,"").trim()));}catch{setResult({error:true});}setLoading(false);}
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Hand 1</div><input value={h1} onChange={e=>setH1(e.target.value)} placeholder="Ah Kd" style={inp}/></div>
        <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Hand 2</div><input value={h2} onChange={e=>setH2(e.target.value)} placeholder="Qh Qc" style={inp}/></div>
      </div>
      <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Board (optional)</div><input value={board} onChange={e=>setBoard(e.target.value)} placeholder="Kc 7h 2d" style={inp}/></div>
      <button onClick={calc} disabled={loading} style={{padding:"11px",borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#5b21b6)",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>{loading?"Calculating...":"Calculate Equity"}</button>
      {result?.error&&<div style={{color:"#f87171",fontSize:13}}>Failed. Try again.</div>}
      {result&&!result.error&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[{h:result.hand1,col:"#7dd3fc"},{h:result.hand2,col:"#f9a8d4"}].map((item,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"12px 14px",border:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:13,fontFamily:"monospace",color:item.col,fontWeight:700}}>{item.h.cards}</span><span style={{fontSize:20,fontWeight:800,color:item.h.equity>=50?"#22c55e":"#f87171"}}>{item.h.equity}%</span></div>
            <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}><div style={{width:item.h.equity+"%",height:"100%",background:item.h.equity>=50?"#22c55e":"#f87171",borderRadius:3}}/></div>
            <div style={{fontSize:11,color:"#64748b",marginTop:6}}>{item.h.description}</div>
          </div>
        ))}
        <div style={{background:"rgba(167,139,250,0.06)",borderRadius:10,padding:"12px",border:"1px solid rgba(167,139,250,0.15)",fontSize:12,color:"#c4b5fd",lineHeight:1.7}}>{result.analysis}</div>
      </div>}
    </div>
  );
}

// ── Range Chart ───────────────────────────────────────────────────
function RangeChart() {
  const premium=new Set(["AA","KK","QQ","JJ","AKs","AKo"]);
  const strong=new Set(["TT","99","AQs","AQo","AJs","KQs","ATs","KJs","QJs"]);
  const spec=new Set(["88","77","66","55","44","33","22","A9s","A8s","A7s","A6s","A5s","A4s","A3s","A2s","KTs","QTs","JTs","T9s","98s","87s","76s","65s","54s","KQo","KJo","QJo","JTo"]);
  const cols={premium:"#22c55e",strong:"#f59e0b",speculative:"#3b82f6",fold:"rgba(255,255,255,0.04)"};
  const tc={premium:"#86efac",strong:"#fcd34d",speculative:"#93c5fd",fold:"#334155"};
  const rev=[...RANKS].reverse();
  return (
    <div style={{overflowX:"auto"}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
        {Object.entries(cols).map(([k,v])=><span key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:11}}><span style={{width:10,height:10,borderRadius:2,background:v,display:"inline-block"}}></span><span style={{color:"#94a3b8",textTransform:"capitalize"}}>{k}</span></span>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(13,1fr)",gap:2,minWidth:400}}>
        {rev.map(r1=>rev.map(r2=>{
          const i=RANKS.indexOf(r1),j=RANKS.indexOf(r2);
          const lbl=i===j?r1+r2:i>j?r1+r2+"s":r1+r2+"o";
          const tier=premium.has(lbl)?"premium":strong.has(lbl)?"strong":spec.has(lbl)?"speculative":"fold";
          return <div key={lbl} title={lbl} style={{aspectRatio:"1",background:cols[tier],borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,color:tc[tier],fontWeight:600}}>{lbl.slice(0,3)}</div>;
        }))}
      </div>
      <div style={{fontSize:11,color:"#475569",marginTop:8}}>BTN open-raise range (8-max cash)</div>
    </div>
  );
}

// ── Bankroll ──────────────────────────────────────────────────────
function BankrollTracker({userId}) {
  const [sessions,setSessions]=useState(()=>loadBankroll(userId));
  const [form,setForm]=useState({date:new Date().toISOString().slice(0,10),game:"",buyin:"",cashout:"",notes:""});
  function add(){if(!form.buyin||!form.cashout)return;const s={id:Date.now(),...form,buyin:parseFloat(form.buyin),cashout:parseFloat(form.cashout),profit:parseFloat(form.cashout)-parseFloat(form.buyin)};const u=[...sessions,s].sort((a,b)=>new Date(a.date)-new Date(b.date));setSessions(u);saveBankroll(userId,u);setForm({date:new Date().toISOString().slice(0,10),game:"",buyin:"",cashout:"",notes:""});}
  function del(id){const u=sessions.filter(s=>s.id!==id);setSessions(u);saveBankroll(userId,u);}
  const total=sessions.reduce((a,s)=>a+s.profit,0);
  const inp={width:"100%",padding:"8px 10px",borderRadius:8,background:"#050d1a",border:"1px solid #1e293b",color:"#e2e8f0",fontSize:12,boxSizing:"border-box",outline:"none",fontFamily:"inherit"};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        {[{l:"Profit",v:(total>=0?"+":"")+total.toFixed(2),c:total>=0?"#22c55e":"#f87171"},{l:"Sessions",v:sessions.length,c:"#67e8f9"},{l:"Win Rate",v:sessions.length?Math.round((sessions.filter(s=>s.profit>0).length/sessions.length)*100)+"%":"—",c:"#fbbf24"}].map(s=>(
          <div key={s.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 12px",border:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:0.8,marginBottom:3}}>{s.l}</div>
            <div style={{fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>
      <div style={{background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"12px",border:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:10,textTransform:"uppercase",letterSpacing:0.8}}>Log Session</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><div style={{fontSize:10,color:"#475569",marginBottom:3}}>Date</div><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp}/></div>
          <div><div style={{fontSize:10,color:"#475569",marginBottom:3}}>Game</div><input value={form.game} onChange={e=>setForm(f=>({...f,game:e.target.value}))} placeholder="1/2 NL" style={inp}/></div>
          <div><div style={{fontSize:10,color:"#475569",marginBottom:3}}>Buy-in ($)</div><input type="number" value={form.buyin} onChange={e=>setForm(f=>({...f,buyin:e.target.value}))} placeholder="200" style={inp}/></div>
          <div><div style={{fontSize:10,color:"#475569",marginBottom:3}}>Cash-out ($)</div><input type="number" value={form.cashout} onChange={e=>setForm(f=>({...f,cashout:e.target.value}))} placeholder="350" style={inp}/></div>
        </div>
        <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes..." style={{...inp,marginBottom:8}}/>
        <button onClick={add} style={{width:"100%",padding:"9px",borderRadius:8,background:"#7c3aed",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Add Session</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}}>
        {[...sessions].reverse().map(s=>(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px 12px",border:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{flex:1}}><div style={{fontSize:12,color:"#e2e8f0",fontWeight:600}}>{s.date}{s.game&&<span style={{color:"#64748b"}}> · {s.game}</span>}</div>{s.notes&&<div style={{fontSize:11,color:"#475569"}}>{s.notes}</div>}</div>
            <div style={{fontSize:13,fontWeight:700,color:s.profit>=0?"#22c55e":"#f87171"}}>{s.profit>=0?"+":""}{s.profit.toFixed(2)}</div>
            <button onClick={()=>del(s.id)} style={{background:"none",border:"none",color:"#334155",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
          </div>
        ))}
        {sessions.length===0&&<div style={{fontSize:12,color:"#334155",textAlign:"center",padding:20}}>No sessions yet.</div>}
      </div>
    </div>
  );
}

// ── Leaderboard ───────────────────────────────────────────────────
function Leaderboard({users,currentUserId}) {
  const sorted=[...users].sort((a,b)=>{const pa=a.totalQ?Math.round(((a.totalCorrect||0)/a.totalQ)*100):0;const pb=b.totalQ?Math.round(((b.totalCorrect||0)/b.totalQ)*100):0;return pb-pa||(b.totalQ||0)-(a.totalQ||0);});
  return (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {sorted.map((u,i)=>{const pct=u.totalQ?Math.round(((u.totalCorrect||0)/u.totalQ)*100):0;const isMe=u.id===currentUserId;return(
        <div key={u.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,background:isMe?"rgba(124,58,237,0.12)":"rgba(255,255,255,0.04)",border:"1px solid "+(isMe?"#4c1d95":"rgba(255,255,255,0.07)")}}>
          <div style={{fontSize:13,fontWeight:700,color:i<3?"#fbbf24":"#475569",minWidth:28}}>{["1st","2nd","3rd"][i]||"#"+(i+1)}</div>
          <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#4c1d95)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>{u.name[0].toUpperCase()}</div>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:isMe?"#c4b5fd":"#e2e8f0"}}>{u.name}{isMe?" (you)":""}</div><div style={{fontSize:11,color:"#475569"}}>{u.totalQ||0} questions</div></div>
          <div style={{fontSize:16,fontWeight:700,color:pct>=70?"#22c55e":pct>=40?"#f59e0b":"#f87171"}}>{u.totalQ?pct+"%":"—"}</div>
        </div>
      );})}
      {users.length===0&&<div style={{fontSize:12,color:"#334155",textAlign:"center",padding:20}}>No players yet.</div>}
    </div>
  );
}

// ── Hand Log ──────────────────────────────────────────────────────
function HandLog({handLog}) {

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search hands..." style={{width:"100%",padding:"9px 12px",borderRadius:8,background:"#050d1a",border:"1px solid #1e293b",color:"#e2e8f0",fontSize:13,boxSizing:"border-box",outline:"none",fontFamily:"inherit"}}/>
      <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:320,overflowY:"auto"}}>
        {filtered.map((h,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px",border:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{color:h.correct?"#22c55e":"#f87171"}}>{h.correct?"✓":"✗"}</span>
              <span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:"rgba(255,255,255,0.06)",color:"#64748b"}}>{STREET_CATS.find(c=>c.id===h.cat)?.label}</span>

              <span style={{fontSize:10,color:"#334155",marginLeft:"auto"}}>{new Date(h.ts).toLocaleDateString()}</span>

    </div>
  );
}

// ── Analytics ─────────────────────────────────────────────────────
function Analytics({profile,onClose}) {
  const [vTab,setVTab]=useState("overall");
  const bv=profile.byVariant||{holdem:{totalQ:0,totalCorrect:0,cats:emptyCats()},omaha:{totalQ:0,totalCorrect:0,cats:emptyCats()}};
  const vd=vTab==="overall"?{q:profile.totalQ||0,c:profile.totalCorrect||0,cats:profile.cats||emptyCats()}:{q:bv[vTab]?.totalQ||0,c:bv[vTab]?.totalCorrect||0,cats:bv[vTab]?.cats||emptyCats()};
  const ov=vd.q?Math.round((vd.c/vd.q)*100):0;
  const ovc=ov>=70?"#22c55e":ov>=40?"#f59e0b":"#f87171";
  const attempted=STREET_CATS.map(c=>({...c,q:vd.cats[c.id]?.q||0,c:vd.cats[c.id]?.c||0,pct:vd.cats[c.id]?.q>=3?Math.round(((vd.cats[c.id]?.c||0)/(vd.cats[c.id]?.q||1))*100):null})).filter(c=>c.pct!==null).sort((a,b)=>a.pct-b.pct);

  const recPct=recent.length?Math.round((recent.filter(h=>h.correct).length/recent.length)*100):null;
  const trend=recPct!==null&&vd.q>20?(recPct>ov?"Improving":"Declining"):null;
  const now=Date.now(),dayMs=86400000;
  const days=Array(7).fill(0).map((_,i)=>{const from=now-(7-i)*dayMs,to=from+dayMs;const hs=(profile.history||[]).filter(h=>(vTab==="overall"||h.variant===vTab)&&h.ts>=from&&h.ts<to);return{qs:hs.length,cs:hs.filter(h=>h.correct).length};});
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}} onClick={onClose}>

          <button onClick={onClose} style={{background:"transparent",border:"1px solid #1e293b",borderRadius:8,color:"#64748b",cursor:"pointer",padding:"4px 10px",fontSize:13}}>✕</button>
        </div>
        <div style={{display:"flex",borderRadius:10,overflow:"hidden",border:"1px solid #1e293b",marginBottom:16}}>
          {[{id:"overall",label:"Overall"},{id:"holdem",label:"Hold'em"},{id:"omaha",label:"Omaha"}].map(v=>(
            <button key={v.id} onClick={()=>setVTab(v.id)} style={{flex:1,padding:"9px",border:"none",background:vTab===v.id?"#7c3aed":"#0f172a",color:vTab===v.id?"#fff":"#64748b",fontSize:12,fontWeight:vTab===v.id?700:400,cursor:"pointer",fontFamily:"inherit"}}>{v.label}{v.id!=="overall"&&<span style={{marginLeft:4,fontSize:10,opacity:0.7}}>{bv[v.id]?.totalQ||0}q</span>}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          {[{l:"Accuracy",v:vd.q?ov+"%":"—",c:ovc,sub:trend},{l:"Questions",v:vd.q,c:"#67e8f9"},{l:"Correct",v:vd.c,c:"#22c55e"}].map(s=>(
            <div key={s.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"12px",border:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>{s.l}</div>
              <div style={{fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div>
              {s.sub&&<div style={{fontSize:10,color:s.sub==="Improving"?"#22c55e":"#f87171",marginTop:2}}>{s.sub}</div>}

            {[{id:"holdem",label:"Hold'em",col:"#7dd3fc"},{id:"omaha",label:"Omaha",col:"#c4b5fd"}].map(v=>{const vq=bv[v.id]?.totalQ||0,vc2=bv[v.id]?.totalCorrect||0,vp=vq?Math.round((vc2/vq)*100):0,pc=vp>=70?"#22c55e":vp>=40?"#f59e0b":"#f87171";return(
              <div key={v.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,color:v.col,fontWeight:600}}>{v.label}</span><span style={{fontSize:11,color:"#475569"}}>{vc2}/{vq} · <span style={{color:pc,fontWeight:600}}>{vq?vp+"%":"—"}</span></span></div>
                <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}><div style={{width:(vq?vp:0)+"%",height:"100%",background:pc,borderRadius:3}}/></div>

              <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}><div style={{width:(s.q?pct:0)+"%",height:"100%",background:col,borderRadius:3}}/></div>

          <div style={{background:"rgba(248,113,113,0.06)",borderRadius:12,padding:"12px",border:"1px solid rgba(248,113,113,0.15)"}}>
            <div style={{fontSize:11,color:"#f87171",fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Leaks</div>
            {leaks.length===0?<div style={{fontSize:12,color:"#475569"}}>None found</div>:leaks.map(c=><div key={c.id} style={{fontSize:12,color:"#fca5a5",marginBottom:3}}>{c.label} — {c.pct}%</div>)}
          </div>
          <div style={{background:"rgba(34,197,94,0.06)",borderRadius:12,padding:"12px",border:"1px solid rgba(34,197,94,0.15)"}}>
            <div style={{fontSize:11,color:"#22c55e",fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>Strengths</div>
            {strengths.length===0?<div style={{fontSize:12,color:"#475569"}}>Keep playing!</div>:strengths.map(c=><div key={c.id} style={{fontSize:12,color:"#86efac",marginBottom:3}}>{c.label} — {c.pct}%</div>)}
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:10,textTransform:"uppercase",letterSpacing:0.8}}>Last 7 Days</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:52}}>
            {days.map((d,i)=>{const h=d.qs?Math.max(6,Math.round((d.qs/Math.max(...days.map(x=>x.qs),1))*48)):3;const pct=d.qs?Math.round((d.cs/d.qs)*100):0;const col=d.qs===0?"rgba(255,255,255,0.06)":pct>=70?"#22c55e":pct>=40?"#f59e0b":"#f87171";return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",height:h,background:col,borderRadius:2}}/><div style={{fontSize:8,color:"#334155"}}>{["7d","6d","5d","4d","3d","2d","1d"][i]}</div></div>);})}
          </div>
        </div>
        {attempted.length>0&&<div style={{marginTop:12,background:"rgba(167,139,250,0.06)",borderRadius:12,padding:"12px",border:"1px solid rgba(167,139,250,0.15)"}}>
          <div style={{fontSize:11,color:"#a78bfa",fontWeight:700,marginBottom:4,textTransform:"uppercase",letterSpacing:0.8}}>Opportunities</div>
          <div style={{fontSize:12,color:"#c4b5fd",lineHeight:1.7}}>{leaks.length>0?"Focus on "+leaks.map(l=>l.label).join(", ")+". ":""}{recPct!==null?"Recent: "+recPct+"% ("+recent.length+" hands). ":""}{(profile.streakBest||0)>=5?"Solid fundamentals.":""}</div>
        </div>}
      </div>
    </div>
  );

// ── Hand Analyzer ─────────────────────────────────────────────────
function HandAnalyzer({onClose}) {
  const [txt,setTxt]=useState("");const [result,setResult]=useState(null);const [loading,setLoading]=useState(false);
  const gc={A:"#22c55e",B:"#86efac",C:"#f59e0b",D:"#f87171"};
  const vc={Good:"#22c55e",Okay:"#f59e0b",Mistake:"#f87171"};
  async function analyze(){setLoading(true);setResult(null);try{const t=await callClaude(`Expert poker coach. Respond ONLY valid JSON: {"summary":"","heroCards":"","board":"","gameContext":"","result":"","overallGrade":"A","gradeSummary":"","streets":[{"street":"Preflop","action":"","grade":"A","verdict":"Good","analysis":"","alternative":null}],"keyMistakes":[],"wellPlayed":[],"studyTip":""}`, "Analyze:\n\n"+txt, 1500);setResult(JSON.parse(t.replace(/```json|```/g,"").trim()));}catch{setResult({error:true});}setLoading(false);}
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}} onClick={onClose}>
      <div style={{background:"#0a0f1e",borderRadius:18,border:"1px solid #1e293b",width:"100%",maxWidth:600,maxHeight:"90vh",overflowY:"auto",padding:24,display:"flex",flexDirection:"column",gap:14}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:17,fontWeight:700,color:"#a78bfa"}}>Hand Analyzer</div><div style={{fontSize:11,color:"#475569",marginTop:2}}>Describe a hand for coaching feedback</div></div>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid #1e293b",borderRadius:8,color:"#64748b",cursor:"pointer",padding:"4px 10px",fontSize:13}}>✕</button>
        </div>
        {!result&&<><textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder={"Describe your hand...\n\nExample:\n$1/$2 NL, BTN with AhKd, $200 stacks.\nMP raises $6, I 3-bet $18, MP calls.\nFlop: Ks7h2c. I bet $22, MP calls.\nTurn: 4d. I bet $50, MP calls.\nRiver: Jc. MP bets $100, I called. MP shows 77. Lost."} rows={9} style={{width:"100%",padding:"12px",borderRadius:10,background:"#050d1a",border:"1px solid #1e293b",color:"#e2e8f0",fontSize:13,lineHeight:1.6,resize:"vertical",outline:"none",fontFamily:"system-ui,sans-serif",boxSizing:"border-box"}}/><button onClick={analyze} disabled={loading||!txt.trim()} style={{padding:"12px",borderRadius:10,background:txt.trim()?"linear-gradient(135deg,#7c3aed,#5b21b6)":"#1e293b",border:"none",color:txt.trim()?"#fff":"#475569",fontSize:14,fontWeight:700,cursor:txt.trim()?"pointer":"default"}}>{loading?"Analyzing...":"Analyze Hand"}</button></>}
        {result?.error&&<div style={{color:"#f87171",fontSize:13,textAlign:"center"}}>Failed. <button onClick={()=>setResult(null)} style={{color:"#a78bfa",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Try again</button></div>}
        {result&&!result.error&&<>
          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px",border:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:56,height:56,borderRadius:10,background:gc[result.overallGrade]+"22",border:"2px solid "+gc[result.overallGrade],display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:800,color:gc[result.overallGrade],flexShrink:0}}>{result.overallGrade}</div>
            <div><div style={{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:3}}>{result.summary}</div><div style={{fontSize:11,color:"#64748b"}}>{result.gameContext} · {result.result}</div><div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>{result.gradeSummary}</div></div>
          </div>
          {(result.streets||[]).map((s,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.03)",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",padding:"11px 13px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:12,fontWeight:700,color:"#475569",minWidth:56}}>{s.street}</span><span style={{fontSize:11,padding:"2px 7px",borderRadius:7,background:vc[s.verdict]+"22",color:vc[s.verdict],fontWeight:600}}>{s.verdict}</span><span style={{fontSize:13,fontWeight:800,color:gc[s.grade],marginLeft:"auto"}}>{s.grade}</span></div>

            <div style={{fontSize:13,color:"#c4b5fd",lineHeight:1.7}}>{result.studyTip}</div>

          <button onClick={()=>{setResult(null);setTxt("");}} style={{padding:"10px",borderRadius:10,background:"transparent",border:"1px solid #1e293b",color:"#64748b",fontSize:13,cursor:"pointer"}}>Analyze Another Hand</button>
        </>}

  );
}

          <div style={{fontSize:13,color:"#475569",marginTop:6}}>by <a href="https://upgradepoker.com" target="_blank" style={{color:"#7dd3fc",textDecoration:"none"}}>upgradepoker.com</a></div>

              <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#4c1d95)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff",flexShrink:0}}>{u.name[0].toUpperCase()}</div>

          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,border:"1px solid rgba(255,255,255,0.1)",padding:16}}>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:8}}>Your name</div>
            <input value={name} onChange={e=>{setName(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="e.g. Alex" autoFocus style={{width:"100%",padding:"10px 12px",borderRadius:8,background:"#0f172a",border:"1px solid #1e293b",color:"#e2e8f0",fontSize:14,boxSizing:"border-box",outline:"none",marginBottom:8,fontFamily:"inherit"}}/>
            {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:8}}>{err}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={add} style={{flex:1,padding:"9px",borderRadius:8,background:"#7c3aed",border:"none",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Create</button>
              <button onClick={()=>{setAdding(false);setErr("");setName("");}} style={{padding:"9px 14px",borderRadius:8,background:"transparent",border:"1px solid #1e293b",color:"#64748b",fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        )}

}

// ── Session Report ────────────────────────────────────────────────
function SessionReport({sessionData,onDone}) {
  const {answers,cat}=sessionData;
  const correct=answers.filter(a=>a.correct).length;
  const pct=Math.round((correct/answers.length)*100);
  const color=pct>=70?"#22c55e":pct>=40?"#f59e0b":"#f87171";
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16,padding:"20px 0"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:48,fontWeight:800,color}}>{pct}%</div><div style={{fontSize:15,color:"#94a3b8",marginTop:4}}>{correct}/{answers.length} correct</div><div style={{fontSize:13,color:"#64748b",marginTop:2}}>{STREET_CATS.find(c=>c.id===cat)?.label} session</div></div>
      <div style={{display:"flex",gap:8}}>{[{l:"Correct",v:correct,c:"#22c55e"},{l:"Wrong",v:answers.length-correct,c:"#f87171"},{l:"Accuracy",v:pct+"%",c:color}].map(s=>(<div key={s.l} style={{flex:1,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px",border:"1px solid rgba(255,255,255,0.06)",textAlign:"center"}}><div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:0.8,marginBottom:3}}>{s.l}</div><div style={{fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div></div>))}</div>
      <button onClick={onDone} style={{padding:"12px",borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#5b21b6)",border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>Back to Training</button>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────
function App() {
  const [screen,setScreen]   = useState("select");
  const [users,setUsers]     = useState(()=>loadUsers());
  const [activeUser,setActiveUser] = useState(null);
  const [tab,setTab]         = useState("quiz");
  const [toolTab,setToolTab] = useState("equity");
  const [gameVariant,setGameVariant] = useState("Hold'em");
  const [gameType,setGameType]       = useState("Cash");
  const [activeCat,setActiveCat]     = useState("preflop");
  const [difficulty,setDifficulty]   = useState("Intermediate");
  const [villain,setVillain]         = useState("TAG");
  const [showPotOdds,setShowPotOdds] = useState(false);
  const [quiz,setQuiz]         = useState(null);
  const [quizError,setQuizError] = useState("");
  const [loading,setLoading]   = useState(false);
  const [selected,setSelected] = useState(null);
  const [hintUsed,setHintUsed] = useState(false);
  const [hint,setHint]         = useState(null);
  const [hintLoading,setHintLoading] = useState(false);
  const [streak,setStreak]     = useState(0);
  const [sessionMode,setSessionMode]     = useState(false);
  const [sessionAnswers,setSessionAnswers] = useState([]);
  const [sessionDone,setSessionDone]     = useState(false);
  const [showAnalytics,setShowAnalytics]       = useState(false);
  const [showHandAnalyzer,setShowHandAnalyzer] = useState(false);
  const quizHistory = useRef([]);
  const SESSION_SIZE = 10;

  function doSelectUser(meta) {
    let p=loadProfile(meta.id); if(!p) p=emptyProfile(meta.name);
    p.sessions=(p.sessions||0)+1; p.lastSeen=Date.now();
    saveProfile(meta.id,p);
    setActiveUser({...p,id:meta.id}); setStreak(0); setScreen("quiz"); setTab("quiz");
  }
  function handleAddUser(name) {
    const id="upc_"+Date.now(),profile=emptyProfile(name),meta={id,name,totalQ:0,totalCorrect:0};
    const nu=[...users,meta]; setUsers(nu); saveUsers(nu); saveProfile(id,profile); doSelectUser(meta);
  }
  function persist(updated) {
    saveProfile(updated.id,updated);
    const nu=users.map(u=>u.id===updated.id?{...u,totalQ:updated.totalQ,totalCorrect:updated.totalCorrect}:u);
    setUsers(nu); saveUsers(nu);
  }

  const fetchQuiz = useCallback(async (cat) => {
    setLoading(true); setQuiz(null); setSelected(null); setHintUsed(false); setHint(null); setQuizError("");
    const deck=shuffleDeck();
    const isOmaha=gameVariant==="Mixed"?Math.random()>0.5:gameVariant==="Omaha";
    const variantName=isOmaha?"Omaha":"Texas Holdem";
    const holeCards=isOmaha?deck.slice(0,4):deck.slice(0,2);
    const board=deck.slice(isOmaha?4:2,isOmaha?9:7);
    const tier=classifyHand(holeCards[0],holeCards[1]);
    const holeStr=holeCards.map(c=>c.rank+c.suit).join(" ");
    const boardStr=board.map(c=>c.rank+c.suit).join(" ");
    // Build correct 8-max position order: seats go clockwise starting UTG after dealer
    // Hero is always last seat (numSeats-1), which maps to BTN visually at bottom
    // Positions assigned clockwise: UTG, UTG+1, UTG+2, MP, HJ, CO, SB, BTN
    const allPos = POS8.slice(0, numSeats);
    // Hero seat is numSeats-1, which is BTN position in the array
    const heroPos = allPos[numSeats - 1]; // This is always BTN visually
    // Override pos to be accurate based on seat
    const pos = allPos[Math.floor(Math.random() * numSeats)];
    const heroSeatIndex = allPos.indexOf(pos);
    const stackArr = [stacks,stacks+20,stacks-15,stacks+40,stacks-10,stacks+60,stacks+10,stacks-5].slice(0,numSeats).map(v=>"$"+Math.max(10,v));
    const sys=`Expert poker coach creating training scenarios. Game: ${variantName}. Format: ${isTournament?"Tournament":"Cash Game"}. Villain: ${villain}.

POSITION RULES — CRITICAL:
- The table has ${numSeats} seats with positions in order: ${allPos.join(", ")}
- Hero is in position: ${pos}
- The heroPosition field in your JSON MUST be "${pos}" — do not change it
- The scenario description MUST refer to hero as being in the ${pos} position
- allPositions in JSON MUST be exactly: ${JSON.stringify(allPos)}
- SB and BB are always the last two positions before UTG. BTN is always last position.

LEGAL ACTIONS RULES — CRITICAL:
- If SB limps/completes, hero's options in BB are: Check or Raise (NOT fold, NOT call — already paid BB)
- If facing a raise, options are: Fold, Call, or Re-raise
- If first to act preflop (no raise), options are: Fold, Call (limp), or Raise
- If facing a bet postflop, options are: Fold, Call, or Raise
- If checked to postflop, options are: Check or Bet
- NEVER include illegal actions as answer options (e.g. fold when in BB facing a limp, call when no bet was made)
- ALL FOUR answer options must be legal poker actions given the exact scenario described

DIFFICULTY — ${difficulty}: ${dc[difficulty]}

GENERAL RULES:
- Use EXACT hole cards: ${holeStr} — never change them
- Vary correct answers: fold / call / raise / check — not always the same
- Scenario must clearly state all relevant action before hero must decide
- 8-max positions in order: UTG UTG+1 UTG+2 MP HJ CO SB BTN

Respond ONLY valid JSON no markdown: {"variant":"${variantName}","gameType":"${isTournament?"Tournament":"Cash Game"}","street":"${street}","heroPosition":"${pos}","numSeats":${numSeats},"dealerSeat":${Math.floor(Math.random()*numSeats)},"allPositions":${JSON.stringify(allPos)},"stackSizes":${JSON.stringify(stackArr)},"bets":{},"potDisplay":"$0","blinds":"${isTournament?"100/200":"1/2"}","holeCards":${JSON.stringify(holeCards.map(c=>({rank:c.rank,suit:c.suit})))},"communityCards":[],"showCommunity":false,"scenario":"2-3 sentences. State hero position (${pos}), describe all action before hero, make clear what legal options exist.","question":"What is the best action?","options":["Legal option A","Legal option B","Legal option C","Legal option D"],"correctIndex":0,"explanation":"3-4 sentences: why correct, reasoning, what makes this spot interesting.","hintText":"One hint guiding thinking without revealing answer.","potOdds":{"potSize":"$0","callAmount":"$0","oddsRatio":"X:1","breakEvenPct":"0%","impliedOdds":"note","recommendation":"call or fold"}}`;
    const prompt=`${cat} ${isTournament?"tournament":"cash"} scenario. Variant: ${variantName}. Hero: ${pos}, ${numSeats}-handed. EXACT cards: ${holeStr} (${tier}). Board seed: ${boardStr}. Stack: ${stacks}. Scenario type: ${sh}.${recent?" Avoid recently seen combos: "+recent:""}

Generate a ${difficulty}-level scenario. The 4 answer options must reflect the difficulty:
${difficulty==="Beginner"?"- One clearly correct answer, three obviously wrong answers (e.g. massive overbet, clear fold with strong hand)":""}
${difficulty==="Intermediate"?"- One correct answer, three plausible-but-wrong answers that intermediate players commonly choose (e.g. slightly wrong sizing, betting when checking is better)":""}
${difficulty==="Advanced"?"- One correct answer that requires solver-level thinking, three answers that all seem reasonable to an experienced player — only one is truly best":""}
`;
    try {
      const txt=await callClaude(sys,prompt,1400);
      const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
      quizHistory.current=[...quizHistory.current.slice(-9),holeCards.map(c=>c.rank+c.suit).join("")];
      setQuiz(parsed);
    } catch(e) {
      setQuizError(e.message||"Unknown error");
      setQuiz({error:true});
    }
    setLoading(false);
  }, [difficulty,villain,gameVariant,gameType]);

  useEffect(()=>{ if(screen==="quiz"&&tab==="quiz") fetchQuiz(activeCat); },[activeCat,screen,tab,gameType,gameVariant,difficulty,villain]);

  async function getHint() {
    if(!quiz||hintUsed) return;
    if(quiz.hintText){setHint(quiz.hintText);setHintUsed(true);return;}
    setHintLoading(true);
    try{const t=await callClaude("Give ONE short poker hint (1 sentence) without revealing the answer.","Hand: "+JSON.stringify({holeCards:quiz.holeCards,scenario:quiz.scenario,question:quiz.question}),200);setHint(t.replace(/```/g,"").trim());}catch{setHint("Consider your position and equity.");}
    setHintUsed(true);setHintLoading(false);
  }

  function handleAnswer(idx) {
    if(selected!==null||!quiz||quiz.error||!activeUser) return;
    setSelected(idx);
    const ok=idx===quiz.correctIndex,ns=ok?streak+1:0; setStreak(ns);
    const vKey=(quiz.variant||"").toLowerCase().includes("omaha")?"omaha":"holdem";
    const bv=activeUser.byVariant||{holdem:{totalQ:0,totalCorrect:0,cats:emptyCats()},omaha:{totalQ:0,totalCorrect:0,cats:emptyCats()}};
    const ve=bv[vKey]||{totalQ:0,totalCorrect:0,cats:emptyCats()};
    const updated={
      ...activeUser,
      totalQ:(activeUser.totalQ||0)+1,totalCorrect:(activeUser.totalCorrect||0)+(ok?1:0),
      streakBest:Math.max(activeUser.streakBest||0,ns),
      byVariant:{...bv,[vKey]:{totalQ:(ve.totalQ||0)+1,totalCorrect:(ve.totalCorrect||0)+(ok?1:0),cats:{...ve.cats,[activeCat]:{q:(ve.cats[activeCat]?.q||0)+1,c:(ve.cats[activeCat]?.c||0)+(ok?1:0)}}}},
      cats:{...activeUser.cats,[activeCat]:{q:(activeUser.cats[activeCat]?.q||0)+1,c:(activeUser.cats[activeCat]?.c||0)+(ok?1:0)}},
      history:[...((activeUser.history||[]).slice(-199)),{ts:Date.now(),cat:activeCat,variant:vKey,correct:ok,question:(quiz.question||"").slice(0,60)}],
      handLog:[...((activeUser.handLog||[]).slice(-499)),{ts:Date.now(),cat:activeCat,variant:vKey,correct:ok,question:quiz.question,yourAnswer:quiz.options?.[idx],hintUsed}],
    };
    setActiveUser(updated); persist(updated);
    if(sessionMode){const na=[...sessionAnswers,{correct:ok,question:quiz.question}];setSessionAnswers(na);if(na.length>=SESSION_SIZE)setSessionDone(true);}
  }

  if(screen==="select") return <UserSelect users={users} onSelect={doSelectUser} onAddUser={handleAddUser}/>;
  if(sessionDone) return <div style={{minHeight:"100vh",background:"#020617",color:"#e2e8f0",padding:24,maxWidth:600,margin:"0 auto"}}><SessionReport sessionData={{answers:sessionAnswers,cat:activeCat}} onDone={()=>{setSessionMode(false);setSessionDone(false);setSessionAnswers([]);fetchQuiz(activeCat);}}/></div>;

  const p=activeUser;
  const tQ=p?.totalQ||0,tC=p?.totalCorrect||0;
  const aVK=gameVariant==="Omaha"?"omaha":gameVariant==="Hold'em"?"holdem":null;
  const bvA=aVK?(p?.byVariant?.[aVK]||{totalQ:0,totalCorrect:0,cats:emptyCats()}):null;
  const dQ=bvA?bvA.totalQ:tQ,dC=bvA?bvA.totalCorrect:tC;
  const dPct=dQ?Math.round((dC/dQ)*100):0;
  const dCol=dPct>=70?"#22c55e":dPct>=40?"#f59e0b":"#f87171";
  const cCats=bvA?bvA.cats:p?.cats||{};
  const catQ=cCats[activeCat]?.q||0,catC=cCats[activeCat]?.c||0;
  const catPct=catQ?Math.round((catC/catQ)*100):null;
  const TOOLS=[{id:"equity",label:"Equity Calc"},{id:"range",label:"Range Chart"},{id:"bankroll",label:"Bankroll"},{id:"leaderboard",label:"Leaderboard"},{id:"handlog",label:"Hand Log"}];

  return (
    <div style={{minHeight:"100vh",background:BG,color:TEXT,fontFamily:"system-ui,sans-serif",display:"flex",flexDirection:"column"}}>
      {showAnalytics&&<Analytics profile={{...p}} onClose={()=>setShowAnalytics(false)}/>}
      {showHandAnalyzer&&<HandAnalyzer onClose={()=>setShowHandAnalyzer(false)}/>}

      {/* Top Bar */}
      <div style={{background:BG2,borderBottom:"1px solid "+BORDER,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,"+TEAL_DARK+","+TEAL+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff",flexShrink:0}}>{p?.name?.[0]?.toUpperCase()}</div>
          <div><div style={{fontSize:13,fontWeight:700,color:TEXT}}>{p?.name}</div><div style={{fontSize:10,color:MUTED}}>Upgrade Poker Coach</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {streak>=2&&<div style={{background:"rgba(26,154,154,0.15)",border:"1px solid "+TEAL,borderRadius:16,padding:"3px 9px",fontSize:11,color:TEAL}}>🔥 {streak}</div>}
          <div style={{background:"rgba(26,154,154,0.1)",border:"1px solid "+BORDER_T,borderRadius:16,padding:"4px 10px",fontSize:11,color:TEAL,fontWeight:600}}>{dC}/{dQ} <span style={{color:dCol}}>({dPct}%)</span>{aVK&&<span style={{color:MUTED,marginLeft:4,fontSize:10}}>{gameVariant}</span>}</div>
          <button onClick={()=>setShowHandAnalyzer(true)} style={{background:"rgba(26,154,154,0.1)",border:"1px solid "+BORDER_T,borderRadius:16,padding:"4px 12px",fontSize:11,color:TEAL,cursor:"pointer",fontWeight:600}}>Analyze Hand</button>
          <button onClick={()=>setShowAnalytics(true)} style={{background:"rgba(26,154,154,0.1)",border:"1px solid "+BORDER_T,borderRadius:16,padding:"4px 12px",fontSize:11,color:TEAL,cursor:"pointer",fontWeight:600}}>Stats</button>
          <button onClick={()=>setScreen("select")} style={{background:"transparent",border:"1px solid "+BORDER,borderRadius:16,padding:"4px 10px",fontSize:11,color:MUTED,cursor:"pointer"}}>Switch</button>
        </div>
      </div>

      {/* Main Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid "+BORDER,background:BG2}}>
        {[{id:"quiz",label:"Training"},{id:"tools",label:"Tools"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px",border:"none",background:"transparent",color:tab===t.id?TEAL:MUTED,fontSize:13,fontWeight:tab===t.id?700:400,cursor:"pointer",borderBottom:tab===t.id?"2px solid "+TEAL:"2px solid transparent",fontFamily:"inherit"}}>{t.label}</button>
        ))}
      </div>

      {/* Tools Tab */}
      {tab==="tools"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",gap:4,padding:"10px 14px",overflowX:"auto",background:BG2,borderBottom:"1px solid "+BORDER}}>
            {TOOLS.map(t=><button key={t.id} onClick={()=>setToolTab(t.id)} style={{whiteSpace:"nowrap",padding:"7px 14px",borderRadius:10,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:toolTab===t.id?TEAL:"rgba(255,255,255,0.04)",color:toolTab===t.id?"#fff":MUTED,fontFamily:"inherit"}}>{t.label}</button>)}
          </div>
          <div style={{flex:1,padding:"18px 16px",maxWidth:680,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
            {toolTab==="equity"&&<EquityCalc/>}
            {toolTab==="range"&&<RangeChart/>}
            {toolTab==="bankroll"&&<BankrollTracker userId={p?.id}/>}
            {toolTab==="leaderboard"&&<Leaderboard users={users} currentUserId={p?.id}/>}
            {toolTab==="handlog"&&<HandLog handLog={p?.handLog||[]}/>}
          </div>
        </div>
      )}

      {/* Training Tab */}
      {tab==="quiz"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{background:BG2,borderBottom:"2px solid "+BORDER}}>
            <CPRow label="Game">
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <SegControl options={["Hold'em","Omaha","Mixed"]} value={gameVariant} onChange={setGameVariant}/>
                <div style={{marginLeft:"auto"}}><Toggle on={showPotOdds} onChange={setShowPotOdds} label="Pot Odds"/></div>
              </div>
            </CPRow>
            <CPRow label="Format">
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <SegControl options={["Cash","Tournament"]} value={gameType} onChange={setGameType}/>
                {gameType==="Tournament"&&<span style={{fontSize:11,color:TEAL,opacity:0.85}}>ICM · Stack depth · Bubble pressure</span>}
                <div style={{marginLeft:"auto",flexShrink:0}}>
                  {!sessionMode
                    ?<button onClick={()=>{setSessionMode(true);setSessionAnswers([]);setSessionDone(false);fetchQuiz(activeCat);}} style={{padding:"8px 16px",borderRadius:8,background:"rgba(26,154,154,0.12)",border:"1px solid "+BORDER_T,color:TEAL,fontSize:12,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>Session ({SESSION_SIZE})</button>
                    :<div style={{padding:"8px 16px",borderRadius:8,background:"rgba(26,154,154,0.2)",border:"1px solid "+TEAL,color:TEAL,fontSize:12,fontWeight:700}}>{sessionAnswers.length}/{SESSION_SIZE}</div>
                  }
                </div>
              </div>
            </CPRow>
            <CPRow label="Focus">
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {STREET_CATS.map(c=>{
                  const active=activeCat===c.id;
                  const cq=cCats[c.id]?.q||0,cc2=cCats[c.id]?.c||0;
                  const cs=cq>=1?Math.round((cc2/cq)*100):null;
                  return <button key={c.id} onClick={()=>setActiveCat(c.id)} style={{padding:"10px 22px",borderRadius:10,border:"1px solid "+(active?TEAL:BORDER),cursor:"pointer",fontSize:13,fontWeight:active?700:400,background:active?TEAL:"transparent",color:active?"#fff":MUTED,fontFamily:"inherit",display:"flex",alignItems:"center",gap:8,transition:"all 0.15s"}}>
                    {c.label}
                    {cs!==null&&<span style={{fontSize:10,background:active?"rgba(0,0,0,0.3)":"rgba(255,255,255,0.07)",borderRadius:8,padding:"2px 8px",color:cs>=70?"#4ade80":cs>=40?"#facc15":"#f87171",fontWeight:600}}>{cs}%</span>}
                  </button>;
                })}
              </div>
            </CPRow>
            <CPRow label="Settings" noBorder={true}>
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <div style={{display:"flex",flexDirection:"column",gap:6,flex:"1 1 140px",minWidth:140}}>
                  <span style={{fontSize:11,color:MUTED}}>Difficulty</span>
                  <select value={difficulty} onChange={e=>setDifficulty(e.target.value)} style={{padding:"9px 12px",borderRadius:8,background:BG3,border:"1px solid "+BORDER,color:TEXT2,fontSize:13,cursor:"pointer",outline:"none"}}>
                    {DIFFICULTIES.map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,flex:"1 1 160px",minWidth:160}}>
                  <span style={{fontSize:11,color:MUTED}}>Villain Type</span>
                  <select value={villain} onChange={e=>setVillain(e.target.value)} style={{padding:"9px 12px",borderRadius:8,background:BG3,border:"1px solid "+BORDER,color:TEXT2,fontSize:13,cursor:"pointer",outline:"none"}}>
                    {ARCHETYPES.map(a=><option key={a}>{a}</option>)}
                  </select>
                </div>
              </div>
            </CPRow>
          </div>

          {/* Quiz Content */}
          <div style={{flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14,maxWidth:700,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
            {loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"50px 0",gap:14}}>
              <div style={{fontSize:40,color:TEAL,animation:"spin 1.2s linear infinite",display:"inline-block"}}>♠</div>
              <div style={{color:MUTED,fontSize:13}}>Shuffling scenario...</div>
              <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
            </div>}
            {quiz?.error&&!loading&&(
              <div style={{textAlign:"center",padding:40}}>
                <div style={{color:"#f87171",marginBottom:8,fontSize:14}}>Failed to load scenario</div>
                {quizError&&<div style={{color:MUTED,fontSize:12,marginBottom:16,lineHeight:1.6,wordBreak:"break-word"}}>{quizError}</div>}
                <button onClick={()=>fetchQuiz(activeCat)} style={{color:TEAL,background:"none",border:"1px solid "+BORDER_T,borderRadius:8,cursor:"pointer",padding:"8px 20px",fontSize:13}}>Retry</button>
              </div>
            )}
            {quiz&&!quiz.error&&!loading&&<>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[quiz.variant,quiz.gameType,quiz.street,"Pos: "+(quiz.heroPosition||"—"),"vs "+villain,difficulty].map((t,i)=>(
                  <span key={i} style={{fontSize:10,padding:"3px 8px",borderRadius:9,background:i===0?"rgba(26,154,154,0.2)":"rgba(255,255,255,0.04)",color:i===0?TEAL:MUTED,border:i===0?"1px solid "+BORDER_T:"1px solid "+BORDER,fontWeight:600}}>{t}</span>
                ))}
                {catPct!==null&&<span style={{marginLeft:"auto",fontSize:10,color:catPct>=70?"#4ade80":catPct>=40?"#facc15":"#f87171",fontWeight:600}}>{catPct}% this category</span>}
              </div>
              <div style={{background:BG2,borderRadius:14,border:"1px solid "+BORDER,padding:"12px 6px 6px"}}><PokerTable quiz={quiz} numSeats={quiz.numSeats||8}/></div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[{l:"Street",v:quiz.street,c:TEAL},{l:"Pos",v:quiz.heroPosition||"—",c:"#fff"},{l:"Pot",v:quiz.potDisplay||"—",c:"#facc15"},{l:"Blinds",v:quiz.blinds||"1/2",c:"#4ade80"}].map(s=>(
                  <div key={s.l} style={{flex:1,minWidth:60,background:BG3,borderRadius:8,padding:"8px 10px",border:"1px solid "+BORDER}}>
                    <div style={{fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:0.8,marginBottom:2}}>{s.l}</div>
                    <div style={{fontSize:13,fontWeight:700,color:s.c}}>{s.v}</div>
                  </div>
                ))}
              </div>
              <div style={{background:BG3,border:"1px solid "+BORDER,borderRadius:10,padding:"11px 14px",fontSize:13,color:TEXT2,lineHeight:1.7}}>{quiz.scenario}</div>
              <div style={{fontSize:15,fontWeight:700,color:TEXT,lineHeight:1.5}}>{quiz.question}</div>
              {quiz.potOdds&&(
                <div style={{borderRadius:10,border:"1px solid "+(showPotOdds?TEAL:BORDER),background:showPotOdds?"rgba(26,154,154,0.07)":BG3,padding:"12px 14px",transition:"all 0.25s"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showPotOdds?10:0}}>
                    <span style={{fontSize:11,color:showPotOdds?TEAL:MUTED,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>Pot Odds — {showPotOdds?"Revealed":"Hidden"}</span>
                    <Toggle on={showPotOdds} onChange={setShowPotOdds}/>
                  </div>
                  {showPotOdds?(
                    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
                      {[{l:"Pot Size",v:quiz.potOdds.potSize,c:"#facc15"},{l:"Call Amount",v:quiz.potOdds.callAmount,c:"#f87171"},{l:"Odds Ratio",v:quiz.potOdds.oddsRatio,c:TEAL},{l:"Break-even",v:quiz.potOdds.breakEvenPct,c:"#4ade80"}].map(s=>(
                        <div key={s.l} style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:"8px 10px"}}>
                          <div style={{fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:0.8,marginBottom:2}}>{s.l}</div>
                          <div style={{fontSize:15,fontWeight:700,color:s.c,fontFamily:"monospace"}}>{s.v}</div>
                        </div>
                      ))}
                      <div style={{gridColumn:"1/-1",fontSize:11,color:TEXT2,lineHeight:1.6}}><span style={{color:TEAL,fontWeight:600}}>Implied: </span>{quiz.potOdds.impliedOdds}</div>
                      <div style={{gridColumn:"1/-1",fontSize:12,color:quiz.potOdds.recommendation?.toLowerCase().includes("call")?"#4ade80":"#f87171",fontWeight:600}}>Math says: {quiz.potOdds.recommendation}</div>
                    </div>
                  ):<div style={{fontSize:11,color:TEXT3,marginTop:6}}>Calculate the odds yourself first — then toggle to check</div>}
                </div>
              )}
              {selected===null&&(!hintUsed
                ?<button onClick={getHint} disabled={hintLoading} style={{alignSelf:"flex-start",padding:"7px 16px",borderRadius:8,background:"rgba(26,154,154,0.08)",border:"1px solid "+BORDER_T,color:TEAL,fontSize:12,cursor:"pointer",fontWeight:600}}>{hintLoading?"...":"Show Hint"}</button>
                :<div style={{fontSize:12,color:TEAL,background:"rgba(26,154,154,0.08)",borderRadius:8,padding:"8px 12px",border:"1px solid "+BORDER_T,lineHeight:1.5}}>Hint: {hint}</div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {quiz.options?.map((opt,i)=>{
                  const isCor=i===quiz.correctIndex,isSel=i===selected;
                  let bg=BG3,border="1px solid "+BORDER,col=TEXT2,icon=null;
                  if(selected!==null){if(isCor){bg="rgba(74,222,128,0.1)";border="1px solid #4ade80";col="#4ade80";icon="✓";}else if(isSel){bg="rgba(248,113,113,0.1)";border="1px solid #f87171";col="#f87171";icon="✗";}else col=MUTED;}
                  return <button key={i} onClick={()=>handleAnswer(i)} style={{textAlign:"left",padding:"12px 14px",borderRadius:10,background:bg,border,color:col,fontSize:13,cursor:selected===null?"pointer":"default",transition:"all 0.15s",fontFamily:"inherit",display:"flex",alignItems:"center",gap:8,lineHeight:1.4}}>
                    <span style={{fontWeight:700,fontSize:11,opacity:0.7,flexShrink:0}}>{icon||String.fromCharCode(65+i)}</span>{opt}
                  </button>;
                })}
              </div>
              {selected!==null&&<div style={{borderRadius:10,padding:"13px 15px",background:selected===quiz.correctIndex?"rgba(74,222,128,0.08)":"rgba(248,113,113,0.08)",border:"1px solid "+(selected===quiz.correctIndex?"#166534":"#991b1b"),fontSize:13,color:TEXT2,lineHeight:1.7}}>
                <div style={{fontWeight:700,color:selected===quiz.correctIndex?"#4ade80":"#f87171",marginBottom:5,fontSize:14}}>{selected===quiz.correctIndex?"Correct!":"Incorrect"}</div>
                {quiz.explanation}
              </div>}
              {selected!==null&&<button onClick={()=>fetchQuiz(activeCat)} style={{padding:"13px",borderRadius:10,background:"linear-gradient(135deg,"+TEAL_DARK+","+TEAL+")",border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>Next Hand</button>}
            </>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
